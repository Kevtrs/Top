async function saveRankingToCloud(userId, rankedArray) {
  if (!userId) return;
  allRankings = { ...allRankings, [userId]: rankedArray };
  await setDoc(doc(db, "rankings", userId), { movies: rankedArray, updatedAt: Date.now() });
}
async function saveWatchedToCloud(userId, watchedArray) {
  if (!userId) return;
  allWatched = { ...allWatched, [userId]: watchedArray };
  await setDoc(doc(db, "watched", userId), { movies: watchedArray, updatedAt: Date.now() });
}
async function saveWatchlistToCloud(userId, watchlistArray) {
  if (!userId) return;
  allWatchlist = { ...allWatchlist, [userId]: watchlistArray };
  await setDoc(doc(db, "watchlist", userId), { movies: watchlistArray, updatedAt: Date.now() });
}
function listenAllRankings(cb) {
  return onSnapshot(collection(db, "rankings"), snap => {
    const data = {};
    snap.forEach(d => { data[d.id] = d.data().movies || []; });
    cb(data);
  }, () => cb({}));
}
function listenAllWatched(cb) {

// ─── PROFILS (dynamiques, illimités) ───────────────────────────────
function slugify(name) {
  return name.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // enlève les accents
    .replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
}
async function createProfile(id, name) {
  const color = PROFILE_COLORS[PROFILES.length % PROFILE_COLORS.length];
  await setDoc(doc(db, "profiles", id), {
    id, name, initial: name.trim()[0]?.toUpperCase() || "?",
    color, createdAt: Date.now()
  });
}
function listenProfiles(cb) {
  return onSnapshot(collection(db, "profiles"), { includeMetadataChanges: true }, snap => {
    const list = [];
    snap.forEach(d => list.push(d.data()));
    list.sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
    cb(list, snap.metadata);
  }, () => cb([], { fromCache: false, hasPendingWrites: false, failed: true }));
}

async function sendRecoToUser(toUserId, movie) {
  const recoId = `${toUserId}_${movie.id}_${Date.now()}`;
  await setDoc(doc(db, "sentRecos", recoId), {
    to: toUserId,
    from: currentUser,
    movie: { id: movie.id, title: movie.title, poster_path: movie.poster_path },
    seen: false,
    createdAt: Date.now()
  });
}
function listenIncomingRecos(cb) {
  return onSnapshot(collection(db, "sentRecos"), snap => {
    const all = [];
    snap.forEach(d => all.push({ docId: d.id, ...d.data() }));
    cb(all);
  }, () => cb([]));
}
async function markRecoSeen(docId) {
  await setDoc(doc(db, "sentRecos", docId), { seen: true }, { merge: true });
}
async function dismissReco(docId) {
  await deleteDoc(doc(db, "sentRecos", docId));
}

async function tmdbFetch(path, params = {}) {
  const url = new URL(`https://api.themoviedb.org/3${path}`);
  url.searchParams.set("api_key", TMDB_API_KEY);
  url.searchParams.set("language", "fr-FR");
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url);
  if (!res.ok) throw new Error("TMDB " + res.status);
  return res.json();
}
async function searchMovies(q) {
  if (!q.trim()) return [];
  const data = await tmdbFetch("/search/movie", { query: q, include_adult: "false" });
  return data.results || [];
}
async function getRecommendations(id) {
  const data = await tmdbFetch(`/movie/${id}/recommendations`);
  return data.results || [];
}
async function getMovieDetails(id) {
  return await tmdbFetch(`/movie/${id}`);
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[ch]));
}
function escapeAttr(value) { return escapeHtml(value); }
function simplifyMovie(m) {
  return {
    id: m.id, title: m.title, poster_path: m.poster_path,
    release_date: m.release_date, vote_average: m.vote_average,
    genre_ids: m.genre_ids || [], addedAt: Date.now()
  };
}
function getAllMovieIdsForUser(userId) {
  return new Set((allRankings[userId] || []).map(m => m.id));
}
function profileById(profileId) {
  return PROFILES.find(pr => pr.id === profileId) || null;
}
function fallbackProfile(profileId) {
  const label = String(profileId || "profil");
  return {
    id: profileId,
    name: label,
    initial: label.trim()[0]?.toUpperCase() || "?",
    color: "var(--lav)"
  };
}
function hasProfile(profileId) {
  return !!profileById(profileId);
}
function renderBootLoading() {
  document.getElementById("root").innerHTML = `<div class="boot-loading"><span class="loading-spin"></span></div>`;
}
function normalizeActiveUsers() {
  if (!profilesServerConfirmed) {
    if (currentUser && !viewingUser) viewingUser = currentUser;
    return;
  }
  if (currentUser && !hasProfile(currentUser)) {
    currentUser = null;
    viewingUser = null;
    localStorage.removeItem("letop_user");
    return;
  }
  if (currentUser && !viewingUser) viewingUser = currentUser;
  if (viewingUser && !hasProfile(viewingUser)) viewingUser = currentUser || null;
}
function profileAvatarHtml(profileId, size) {
  const p = profileById(profileId) || { initial: "?", color: "var(--lav)" };
  const topMovie = (allRankings[profileId] || [])[0];
  if (topMovie?.poster_path) {
    return `<img class="avatar-poster" style="width:${size}px;height:${size}px" src="${TMDB_IMG + topMovie.poster_path}" alt="">`;
  }
  return `<span class="avatar-initial-sm" style="width:${size}px;height:${size}px;background:${escapeAttr(p.color)}">${escapeHtml(p.initial)}</span>`;
}

      <path class="tab-icon-base" d="M5 21h14"></path>
    </svg>`;
  }
  if (icon === "ticket") {
    return `<svg ${common}>
      <path class="tab-ticket-body" d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path>
      <path class="tab-ticket-cut" d="M13 5v2"></path>
      <path class="tab-ticket-cut" d="M13 17v2"></path>
      <path class="tab-ticket-cut" d="M13 11v2"></path>
    </svg>`;
  }
  if (icon === "hand") {
    return `<svg ${common}>
      <path class="tab-hand-finger" d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2"></path>
      <path class="tab-hand-finger" d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"></path>
      <path class="tab-hand-finger" d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"></path>
      <path class="tab-hand-palm" d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"></path>
    </svg>`;
  }
  if (icon === "popcorn") {
    return `<svg ${common}>
      <path class="tab-popcorn-kernels" d="M18 8a2 2 0 0 0 0-4 2 2 0 0 0-4 0 2 2 0 0 0-4 0 2 2 0 0 0-4 0 2 2 0 0 0 0 4"></path>
      <path class="tab-popcorn-line" d="M10 22 9 8"></path>

    <path class="tab-users-side" d="M22 20c0-3.37-2-6.5-4-8a5 5 0 0 0-.45-8.3"></path>

function renderCreateProfileScreen() {
  document.getElementById("root").innerHTML = `
  <div class="onboard-screen">
    <div class="onboard-step">NOUVEAU PROFIL</div>
    <div class="onboard-title">C'est qui ? 🎬</div>
    <div class="onboard-text">Choisis ton prénom — tu pourras ensuite chercher ton film n°1.</div>
    <div class="search-box" id="newname-box" style="margin-top:18px">
      <span class="search-icon">✏️</span>
      <input type="text" id="newname-input" placeholder="Ton prénom..." maxlength="20">
    </div>
    <button class="btn-primary" id="btn-confirm-name" style="margin-top:16px">Continuer</button>
    <button class="btn-secondary" id="btn-cancel-create" style="margin-top:10px">Annuler</button>
  </div>`;

  const input = document.getElementById("newname-input");
  const box = document.getElementById("newname-box");
  input.addEventListener("focus", () => box.classList.add("focused"));
  input.addEventListener("blur", () => box.classList.remove("focused"));
  input.focus();

  let submitting = false;
  const confirm = async () => {
    if (submitting) return;
    const name = input.value.trim();
    if (!name) { showToast("Entre un prénom"); return; }
    const existingIds = PROFILES.map(p => p.id);
    let id = slugify(name);
    if (existingIds.includes(id)) { showToast("Ce profil existe déjà"); return; }

    const btn = document.getElementById("btn-confirm-name");
    btn.innerHTML = `<span class="loading-spin"></span>`; btn.disabled = true;
    submitting = true;

    // IMPORTANT: on bascule l'état AVANT l'écriture Firestore, car setDoc()
    // déclenche le listener onSnapshot de façon quasi-synchrone, qui appelle
    // renderPage() — s'il voit encore creatingProfile=true, il réaffiche
    // l'écran de saisie du nom et écrase ce flux en cours.
    creatingProfile = false;
    id = slugify(name) || `profil-${Date.now()}`;
    onboardingNewUser = id;
    currentUser = id;
    viewingUser = id;
    localStorage.setItem("letop_user", id);

    try {
      await createProfile(id, name);
      renderOnboarding();
    } catch (e) {
      creatingProfile = true;
      onboardingNewUser = null;
      currentUser = null;
      viewingUser = null;
      localStorage.removeItem("letop_user");
      showToast("Erreur de création du profil");
      renderCreateProfileScreen();
    }
  };

  document.getElementById("btn-confirm-name").addEventListener("click", confirm);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") confirm(); });
  document.getElementById("btn-cancel-create").addEventListener("click", () => {
    creatingProfile = false;
    renderPage();
  });
}

// ─── ONBOARDING — choisir son film n°1 (devient l'avatar) ─────────
function renderOnboarding() {
  const onboardingId = onboardingNewUser;
  const me = profileById(onboardingId) || { id: onboardingId, name: "toi" };
  document.getElementById("root").innerHTML = `
  <div class="onboard-screen">
    <div class="onboard-step">ÉTAPE 1/1</div>
    <div class="onboard-title">Salut ${escapeHtml(me.name)} 👋</div>
    <div class="onboard-text">Cherche ton film préféré — il deviendra ton numéro 1 <strong>et</strong> ta photo de profil.</div>
    <div class="search-box" id="onboard-search-box" style="margin-top:18px">
      <span class="search-icon">🔍</span>
      <input type="text" id="onboard-search-input" placeholder="Ton film n°1...">
    </div>
    <div id="onboard-results"></div>
  </div>`;

  const input = document.getElementById("onboard-search-input");
  const box = document.getElementById("onboard-search-box");
  input.addEventListener("focus", () => box.classList.add("focused"));
  input.addEventListener("blur", () => box.classList.remove("focused"));
  let t;
  let selectingMovie = false;
  input.addEventListener("input", (e) => {
    clearTimeout(t);
    const q = e.target.value;
    const zone = document.getElementById("onboard-results");
    if (!q.trim()) { zone.innerHTML = ""; return; }
    zone.innerHTML = `<div class="skeleton-grid">${Array(6).fill('<div class="skeleton-card"></div>').join("")}</div>`;
    t = setTimeout(async () => {
      try {
        const results = await searchMovies(q);
        if (!document.body.contains(zone) || input.value !== q || onboardingNewUser !== onboardingId) return;
        if (!results.length) { zone.innerHTML = `<div style="padding:16px;text-align:center;color:var(--ink-faint);font-size:13px;font-weight:600">Aucun résultat</div>`; return; }
        zone.innerHTML = `<div class="search-results">${results.slice(0,9).map(m => {
          const poster = m.poster_path ? TMDB_IMG + m.poster_path : "";
          const title = escapeHtml(m.title);
          const year = m.release_date ? ` (${escapeHtml(m.release_date.slice(0,4))})` : "";
          return `
          <div class="poster-pick" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(m)))}'>
            ${poster ? `<img src="${poster}" alt="${escapeAttr(m.title)}">` : `<div style="aspect-ratio:2/3;background:#E8E4F5"></div>`}
            <div class="poster-pick-title">${title}${year}</div>
          </div>`;
        }).join("")}</div>`;
        zone.querySelectorAll(".poster-pick").forEach(card => {
          card.addEventListener("click", async () => {
            if (selectingMovie) return;
            selectingMovie = true;
            card.style.pointerEvents = "none";
            const movie = JSON.parse(card.dataset.movie);
            const userId = onboardingNewUser;
            onboardingNewUser = null;
            try {
              await saveRankingToCloud(userId, [movie]);
              showToast(`Bienvenue ${me.name} 🎬`);
            } catch (e) {
              onboardingNewUser = userId;
              showToast("Erreur d'enregistrement");
              renderOnboarding();
              return;
            }
            onboardingNewUser = null;
            renderPage();
          });
        });
      } catch(e) {
        if (!document.body.contains(zone) || input.value !== q || onboardingNewUser !== onboardingId) return;
        zone.innerHTML = `<div style="padding:16px;text-align:center;color:var(--ink-faint);font-size:13px;font-weight:600">Erreur de recherche</div>`;
      }
    }, 350);
  });
}

function renderIncomingRecosHtml(myIncoming) {
  if (!myIncoming.length) return "";
  return `
  <div class="reco-banner-zone" id="reco-banner-zone">
    ${myIncoming.map(r => {
      const fromProfile = PROFILES.find(p => p.id === r.from);
      const poster = r.movie.poster_path ? TMDB_IMG + r.movie.poster_path : "";
      return `
      <div class="reco-banner" data-doc="${escapeAttr(r.docId)}">
        ${poster ? `<img class="reco-banner-poster" src="${poster}" alt="">` : `<div class="reco-banner-poster" style="background:#E8E4F5"></div>`}
        <div class="reco-banner-text">
          <strong>${escapeHtml(fromProfile?.name || "Quelqu'un")}</strong> te recommande
          <div class="reco-banner-title">${escapeHtml(r.movie.title)}</div>
        </div>
        <button class="reco-banner-dismiss" data-doc="${escapeAttr(r.docId)}">✕</button>
      </div>`;
    }).join("")}
  </div>`;
}

function renderSearchBox(prefix, placeholder) {
  const boxId = prefix === "search" ? "search-box" : `${prefix}-search-box`;
  const inputId = prefix === "search" ? "search-input" : `${prefix}-search-input`;
  const resultsId = prefix === "search" ? "search-results-zone" : `${prefix}-results-zone`;
  return `
  <div class="search-wrap">
    <div class="search-box" id="${boxId}">
      <span class="search-icon">🔍</span>
      <input type="text" id="${inputId}" placeholder="${escapeAttr(placeholder)}">
    </div>
  </div>
  <div id="${resultsId}"></div>`;
}

function renderActiveTabContent(viewed, myIncoming) {
  if (activeTab === "watched") return renderWatchedTabContent();
  if (activeTab === "recos") return renderRecosTabContent(myIncoming);
  if (activeTab === "watchlist") return renderWatchlistTabContent();
  if (activeTab === "friends") return renderFriendsTabContent(viewed);
  return renderTopTabContent();
}

function renderApp() {
  const me = profileById(currentUser) || (!profilesServerConfirmed && currentUser ? fallbackProfile(currentUser) : null);
  if (!me) {
    normalizeActiveUsers();
    renderProfilePicker();
    return;
  }
  let viewed = profileById(viewingUser) || (!profilesServerConfirmed && viewingUser ? fallbackProfile(viewingUser) : null);
  if (!viewed) {
    viewingUser = currentUser;
    viewed = me;
  }
  if (activeTab !== "friends") {
    viewingUser = currentUser;
    viewed = me;
  }
  const isOwnProfile = activeTab === "top";

  const myIncoming = incomingRecos.filter(r => r.to === currentUser && !r.seen);

  document.getElementById("root").innerHTML = `
    <div class="header">
      <div class="header-row">
        <div>
          <div class="brand-title">Le Top 🍿</div>
          <div class="brand-sub">${activeTabLabel()}</div>
        </div>
        <div class="header-btns">
          <button class="icon-pill" id="btn-install" title="Ajouter à l'écran d'accueil">📲</button>
          ${activeTab === "top" ? `<button class="icon-pill" id="btn-reset" title="Tout effacer">🗑️</button>` : ""}
        </div>
      </div>
    </div>

    <main class="tab-content">
      ${renderActiveTabContent(viewed, myIncoming)}
    </main>

    ${renderTabBar()}
  `;

  attachAppEvents();
  renderActiveTabView();

  // Marque les recos comme vues après un court délai (le temps qu'on les voie vraiment)
  if (activeTab === "recos" && myIncoming.length) {
    setTimeout(() => myIncoming.forEach(r => markRecoSeen(r.docId).catch(() => {})), 2000);
  }
}

function renderPage() {
  if (!profilesSynced && !creatingProfile && !onboardingNewUser) {
    renderBootLoading();
    return;
  }
  if (currentUser && !rankingsSynced && !onboardingNewUser) {
    renderBootLoading();
    return;
  }
  if (onboardingNewUser) {
    renderOnboarding();
  } else if (!currentUser || creatingProfile) {
    renderProfilePicker();
  } else {
    renderApp();
  }
}

function renderActiveTabView() {
  if (activeTab === "watched") {
    renderWatchedList();
  } else if (activeTab === "recos") {
    updateRecommendations();
  } else if (activeTab === "watchlist") {
    renderWatchlist();
  } else {
    renderRanked();
  }
}

function attachShelfSearch(mode) {
  const box = document.getElementById(`${mode}-search-box`);
  const input = document.getElementById(`${mode}-search-input`);
  const zone = document.getElementById(`${mode}-results-zone`);
  if (!box || !input || !zone) return;
  let searchTimeout;
  input.addEventListener("focus", () => box.classList.add("focused"));
  input.addEventListener("blur", () => box.classList.remove("focused"));
  input.addEventListener("input", (e) => {
    clearTimeout(searchTimeout);
    const q = e.target.value;
    if (!q.trim()) { zone.innerHTML = ""; return; }
    zone.innerHTML = `<div class="skeleton-grid">${Array(6).fill('<div class="skeleton-card"></div>').join("")}</div>`;
    searchTimeout = setTimeout(() => runShelfSearch(q, mode), 350);
  });
}

function attachAppEvents() {
  document.getElementById("btn-install")?.addEventListener("click", openInstallSheet);

  document.querySelectorAll(".app-tab-item").forEach(btn => {
    btn.addEventListener("click", () => {
      const nextTab = btn.dataset.tab;
      if (nextTab === activeTab) return;
      activeTab = nextTab;
      if (activeTab !== "friends") viewingUser = currentUser;
      window.scrollTo({ top: 0, behavior: "smooth" });
      renderPage();
    });
  });

  document.getElementById("btn-reset")?.addEventListener("click", () => {
    if (confirm("Effacer tout ton classement ?")) {
      saveRankingToCloud(currentUser, []).catch(() => showToast("Erreur d'enregistrement"));
      renderRanked();
      showToast("Classement réinitialisé");
    }
  });

  document.querySelectorAll(".profile-chip").forEach(el => {
    el.addEventListener("click", () => {
      viewingUser = el.dataset.id;
      renderPage();
    });
  });

  document.querySelectorAll(".reco-banner-dismiss").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      dismissReco(btn.dataset.doc).catch(() => showToast("Erreur"));
    });
  });
  document.querySelectorAll(".reco-banner").forEach(el => {
    el.addEventListener("click", () => dismissReco(el.dataset.doc).catch(() => showToast("Erreur")));
  });

  const searchBox = document.getElementById("search-box");
  const searchInput = document.getElementById("search-input");
  if (searchInput) {
    searchInput.addEventListener("focus", () => searchBox.classList.add("focused"));
    searchInput.addEventListener("blur", () => searchBox.classList.remove("focused"));
    let searchTimeout;
    searchInput.addEventListener("input", (e) => {
      clearTimeout(searchTimeout);
      const q = e.target.value;
      if (!q.trim()) { document.getElementById("search-results-zone").innerHTML = ""; return; }
      document.getElementById("search-results-zone").innerHTML = `<div class="skeleton-grid">${Array(6).fill('<div class="skeleton-card"></div>').join("")}</div>`;
      searchTimeout = setTimeout(() => runSearch(q), 350);
    });
  }

  attachShelfSearch("watched");
  attachShelfSearch("watchlist");

  document.getElementById("reco-accordion-header")?.addEventListener("click", () => {
    recoExpanded = !recoExpanded;
    toggleAccordion("reco", recoExpanded);
    if (recoExpanded) updateRecommendations();
  });
  document.getElementById("recent-accordion-header")?.addEventListener("click", () => {
    const body = document.getElementById("recent-body");
    const expanded = body.style.display !== "none";
    toggleAccordion("recent", !expanded);
    if (!expanded) renderRecentFeed();
  });
}

function toggleAccordion(prefix, expand) {
  const body = document.getElementById(`${prefix}-body`);
  const chevron = document.getElementById(`${prefix}-chevron`);
  if (!body || !chevron) return;
  body.style.display = expand ? "block" : "none";
  chevron.style.transform = expand ? "rotate(180deg)" : "rotate(0deg)";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function fireConfetti(originEl) {
  const rect = originEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const colors = ['var(--confetti-1)','var(--confetti-2)','var(--confetti-3)','var(--confetti-4)'];
  for (let i = 0; i < 22; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.background = colors[i % colors.length];
    piece.style.left = cx + 'px';
    piece.style.top = cy + 'px';
    const angle = (Math.PI * 2 * i) / 22 + (Math.random()*0.5);
    const dist = 60 + Math.random() * 70;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 30;
    const rot = Math.random() * 720 - 360;
    document.body.appendChild(piece);
    piece.animate([
      { transform: 'translate(0,0) rotate(0deg) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px, ${dy}px) rotate(${rot}deg) scale(0.4)`, opacity: 0 }
    ], { duration: 700 + Math.random()*300, easing: 'cubic-bezier(.2,.8,.2,1)' }).onfinish = () => piece.remove();
  }
}

async function runSearch(query) {
  const zone = document.getElementById("search-results-zone");
  const input = document.getElementById("search-input");
  if (!zone || !input) return;
  try {
    const results = await searchMovies(query);
    if (!document.body.contains(zone) || input.value !== query) return;
    const allIds = getAllMovieIdsForUser(currentUser);
    if (!results.length) {
      zone.innerHTML = `<div style="padding:20px;text-align:center;color:var(--ink-faint);font-size:13px;font-weight:600">Aucun résultat</div>`;
      return;
    }
    zone.innerHTML = `<div class="search-results">${results.slice(0,9).map(m => {
      const added = allIds.has(m.id);
      const poster = m.poster_path ? TMDB_IMG + m.poster_path : "";
      const title = escapeHtml(m.title);
      const year = m.release_date ? ` (${escapeHtml(m.release_date.slice(0,4))})` : "";
      return `
      <div class="poster-pick ${added ? "added" : ""}" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(m)))}'>
        ${poster ? `<img src="${poster}" alt="${escapeAttr(m.title)}">` : `<div style="aspect-ratio:2/3;background:#E8E4F5;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink-faint);padding:6px;text-align:center">Pas d'affiche</div>`}
        <div class="poster-pick-title">${title}${year}</div>
        <div class="poster-pick-recommend" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(m)))}'>👋 Recommander</div>
      </div>`;
    }).join("")}</div>`;

    zone.querySelectorAll(".poster-pick-recommend").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        openRecommendSheet(JSON.parse(btn.dataset.movie));
      });
    });

    zone.querySelectorAll(".poster-pick:not(.added)").forEach(card => {
      card.addEventListener("click", () => {
        const movie = JSON.parse(card.dataset.movie);
        addToRanked(movie);
        document.getElementById("search-input").value = "";
        zone.innerHTML = "";
        document.getElementById("search-input").blur();
      });
    });
  } catch (e) {
    if (!document.body.contains(zone) || input.value !== query) return;
    zone.innerHTML = `<div style="padding:20px;text-align:center;color:var(--ink-faint);font-size:13px;font-weight:600">Erreur — vérifie ta clé API</div>`;
  }
}

async function runShelfSearch(query, mode) {
  const zone = document.getElementById(`${mode}-results-zone`);
  const input = document.getElementById(`${mode}-search-input`);
  if (!zone || !input) return;
  try {
    const results = await searchMovies(query);
    if (!document.body.contains(zone) || input.value !== query) return;
    const currentIds = new Set((mode === "watched" ? myWatched() : myWatchlist()).map(m => m.id));
    if (!results.length) {
      zone.innerHTML = `<div style="padding:20px;text-align:center;color:var(--ink-faint);font-size:13px;font-weight:600">Aucun résultat</div>`;
      return;
    }
    zone.innerHTML = `<div class="search-results">${results.slice(0,9).map(m => {
      const added = currentIds.has(m.id);
      const poster = m.poster_path ? TMDB_IMG + m.poster_path : "";
      const title = escapeHtml(m.title);
      const year = m.release_date ? ` (${escapeHtml(m.release_date.slice(0,4))})` : "";
      const actionText = mode === "watched" ? "Noter" : "Ajouter";
      return `
      <div class="poster-pick ${added ? "added" : ""}" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(m)))}'>
        ${poster ? `<img src="${poster}" alt="${escapeAttr(m.title)}">` : `<div style="aspect-ratio:2/3;background:#E8E4F5;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink-faint);padding:6px;text-align:center">Pas d'affiche</div>`}
        <div class="poster-pick-title">${title}${year}</div>
        <div class="poster-pick-recommend">${actionText}</div>
      </div>`;
    }).join("")}</div>`;

    zone.querySelectorAll(".poster-pick:not(.added)").forEach(card => {
      card.addEventListener("click", () => {
        const movie = JSON.parse(card.dataset.movie);
        if (mode === "watched") openRatingSheet(movie);
        else addToWatchlist(movie);
        input.value = "";
        zone.innerHTML = "";
        input.blur();
      });
    });
  } catch (e) {
    if (!document.body.contains(zone) || input.value !== query) return;
    zone.innerHTML = `<div style="padding:20px;text-align:center;color:var(--ink-faint);font-size:13px;font-weight:600">Erreur de recherche</div>`;
  }
}

function addToRanked(movie) {
  if (!currentUser) return;
  const list = myRanked();
  if (list.some(m => m.id === movie.id)) { showToast("Déjà dans ton classement"); return; }
  const updated = [...list, movie];
  saveRankingToCloud(currentUser, updated).catch(() => showToast("Erreur d'enregistrement"));
  if (viewingUser === currentUser) renderRanked();
  showToast(`${movie.title} ajouté en position ${updated.length}`);
}

function openRatingSheet(movie, origin = null) {
  pendingRatingMovie = movie;
  pendingRatingOrigin = origin;
  const poster = movie.poster_path ? TMDB_IMG + movie.poster_path : "";
  document.getElementById("rating-preview").innerHTML = `
    ${poster ? `<img src="${poster}" alt="">` : ""}
    <div>
      <div class="context-preview-title">${escapeHtml(movie.title)}</div>
      <div class="rating-subtitle">Ta note sur 10</div>
    </div>
  `;
  document.getElementById("rating-options").innerHTML = Array.from({ length: 10 }, (_, i) => {
    const rating = i + 1;
    return `<button class="rating-choice" data-rating="${rating}" type="button">${rating}</button>`;
  }).join("");
  document.getElementById("rating-overlay").classList.add("show");
  document.querySelectorAll(".rating-choice").forEach(btn => {
    btn.addEventListener("click", () => {
      addToWatched(pendingRatingMovie, parseInt(btn.dataset.rating));
      if (pendingRatingOrigin === "watchlist") removeFromWatchlist(pendingRatingMovie.id);
      closeRatingSheet();
    });
  });
}

function closeRatingSheet() {
  document.getElementById("rating-overlay").classList.remove("show");
  pendingRatingMovie = null;
  pendingRatingOrigin = null;
}

function addToWatched(movie, rating) {
  if (!currentUser || !movie) return;
  const list = myWatched();
  const watchedMovie = { ...simplifyMovie(movie), watchedAt: Date.now(), rating };
  const existingIndex = list.findIndex(m => m.id === movie.id);
  const updated = existingIndex >= 0 ? [...list] : [watchedMovie, ...list];
  if (existingIndex >= 0) updated[existingIndex] = { ...updated[existingIndex], ...watchedMovie };
  saveWatchedToCloud(currentUser, updated).catch(() => showToast("Erreur d'enregistrement"));
  renderWatchedList();
  showToast(`${movie.title} noté ${rating}/10`);
}

function removeFromWatched(movieId) {
  const updated = myWatched().filter(m => m.id !== movieId);
  saveWatchedToCloud(currentUser, updated).catch(() => showToast("Erreur d'enregistrement"));
  renderWatchedList();
}

function addToWatchlist(movie) {
  if (!currentUser || !movie) return;
  const list = myWatchlist();
  if (list.some(m => m.id === movie.id)) { showToast("Déjà dans À voir"); return; }
  const updated = [{ ...simplifyMovie(movie), savedAt: Date.now() }, ...list];
  saveWatchlistToCloud(currentUser, updated).catch(() => showToast("Erreur d'enregistrement"));
  renderWatchlist();
  showToast(`${movie.title} ajouté à À voir`);
}

function removeFromWatchlist(movieId) {
  const updated = myWatchlist().filter(m => m.id !== movieId);
  saveWatchlistToCloud(currentUser, updated).catch(() => showToast("Erreur d'enregistrement"));
  renderWatchlist();
}

function renderRanked() {
  const el = document.getElementById("rank-list");
  if (!el) return;
  const isOwnProfile = viewingUser === currentUser && activeTab === "top";
  const canRecommend = viewingUser !== currentUser;
  const list = viewedRanked();

  if (!list.length) {
    el.innerHTML = `<div class="empty-state">${isOwnProfile ? "Cherche un film ci-dessus pour commencer ton classement 🎬" : "Ce profil n'a pas encore classé de film"}</div>`;
    return;
  }
  el.innerHTML = list.map((m, i) => {
    const poster = m.poster_path ? TMDB_IMG + m.poster_path : "";
    const title = escapeHtml(m.title);
    const year = m.release_date ? escapeHtml(m.release_date.slice(0,4)) : "????";
    const rating = m.vote_average ? Number(m.vote_average).toFixed(1) : "—";
    return `
    <div class="rank-card" draggable="${isOwnProfile}" data-index="${i}" data-pos="${i+1}">
      <div class="rank-badge">${i+1}</div>
      ${poster ? `<img class="rank-poster" src="${poster}" alt="${escapeAttr(m.title)}">` : `<div class="rank-poster" style="background:#E8E4F5;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--ink-faint);text-align:center;padding:4px">${title}</div>`}
      <div class="rank-info">
        <div class="rank-title">${title}</div>
        <div class="rank-meta">${year} · ⭐ ${rating}</div>
      </div>
      ${canRecommend ? `<button class="rank-recommend-btn" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(m)))}'>👋</button>` : ""}
    </div>`;
  }).join("");

  if (isOwnProfile) {
    attachRankInteractions();
  } else if (canRecommend) {
    el.querySelectorAll(".rank-recommend-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        openRecommendSheet(JSON.parse(btn.dataset.movie));
      });
    });
  }
}

function attachRankInteractions() {
  const rows = document.querySelectorAll(".rank-card");

  rows.forEach(row => {
    row.addEventListener("dragstart", () => {
      draggedIndex = parseInt(row.dataset.index);
      row.classList.add("dragging");
    });
    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      rows.forEach(r => r.classList.remove("drop-line-top","drop-line-bottom"));
    });
    row.addEventListener("dragover", (e) => {
      e.preventDefault();
      const targetIndex = parseInt(row.dataset.index);
      if (draggedIndex === null || targetIndex === draggedIndex) return;
      const rect = row.getBoundingClientRect();
      const mid = rect.top + rect.height/2;
      row.classList.remove("drop-line-top","drop-line-bottom");
      row.classList.add(e.clientY < mid ? "drop-line-top" : "drop-line-bottom");
    });
    row.addEventListener("dragleave", () => row.classList.remove("drop-line-top","drop-line-bottom"));
    row.addEventListener("drop", (e) => {
      e.preventDefault();
      const targetIndex = parseInt(row.dataset.index);
      const insertAfter = row.classList.contains("drop-line-bottom");
      row.classList.remove("drop-line-top","drop-line-bottom");
      if (draggedIndex === null || targetIndex === draggedIndex) return;
      moveMovie(draggedIndex, targetIndex, insertAfter);
      draggedIndex = null;
    });

    let pressTimer = null;
    let startX = 0;
    let startY = 0;
    let lastTouch = null;

    const clearPressTimer = () => {
      clearTimeout(pressTimer);
      pressTimer = null;
      row.classList.remove("pressed");
    };

    row.addEventListener("touchstart", (e) => {
      if (e.touches.length !== 1 || touchDragState) return;
      const touch = e.touches[0];
      startX = touch.clientX;
      startY = touch.clientY;
      lastTouch = { clientX: touch.clientX, clientY: touch.clientY };
      row.classList.add("pressed");
      pressTimer = setTimeout(() => {
        startTouchRankDrag(row, lastTouch);
        pressTimer = null;
      }, 320);
    }, { passive: true });

    row.addEventListener("touchmove", (e) => {
      const touch = e.touches[0];
      if (!touch) return;
      lastTouch = { clientX: touch.clientX, clientY: touch.clientY };

      if (touchDragState) {
        e.preventDefault();
        updateTouchRankDrag(lastTouch);
        return;
      }

      const dx = Math.abs(touch.clientX - startX);
      const dy = Math.abs(touch.clientY - startY);
      if (pressTimer && (dx > 8 || dy > 8)) clearPressTimer();
    }, { passive: false });

    row.addEventListener("touchend", (e) => {
      if (touchDragState) {
        e.preventDefault();
        finishTouchRankDrag();
      }
      clearPressTimer();
    });

    row.addEventListener("touchcancel", () => {
      cancelTouchRankDrag();
      clearPressTimer();
    });
  });
}

function clearTouchDropMarkers() {
  document.querySelectorAll(".rank-card").forEach(r => r.classList.remove("drop-line-top","drop-line-bottom"));
}

function startTouchRankDrag(row, touch) {
  if (!touch || touchDragState) return;
  const rect = row.getBoundingClientRect();
  const ghost = row.cloneNode(true);
  ghost.classList.add("touch-drag-ghost");
  ghost.style.left = rect.left + "px";
  ghost.style.top = rect.top + "px";
  ghost.style.width = rect.width + "px";
  ghost.style.height = rect.height + "px";
  ghost.style.pointerEvents = "none";
  ghost.removeAttribute("id");

  document.body.appendChild(ghost);
  document.body.classList.add("rank-touch-dragging");
  row.classList.remove("pressed");
  row.classList.add("touch-drag-source");

  touchDragState = {
    sourceIndex: parseInt(row.dataset.index),
    targetIndex: null,
    insertAfter: false,
    sourceRow: row,
    ghost,
    offsetY: touch.clientY - rect.top,
    latestY: touch.clientY,
    autoScrollSpeed: 0,
    autoScrollFrame: null
  };

  if (navigator.vibrate) navigator.vibrate(8);
  updateTouchRankDrag(touch);
}

function updateTouchRankDrag(touch) {
  if (!touchDragState) return;
  touchDragState.latestY = touch.clientY;
  touchDragState.ghost.style.top = (touch.clientY - touchDragState.offsetY) + "px";
  updateTouchDropTarget(touch.clientY);
  updateTouchAutoScroll(touch.clientY);
}

function updateTouchDropTarget(y) {
  if (!touchDragState) return;
  clearTouchDropMarkers();
  const rows = [...document.querySelectorAll(".rank-card:not(.touch-drag-source):not(.touch-drag-ghost)")];
  if (!rows.length) {
    touchDragState.targetIndex = null;
    touchDragState.insertAfter = false;
    return;
  }

  let target = rows.find(row => {
    const rect = row.getBoundingClientRect();
    return y >= rect.top && y <= rect.bottom;
  });

  if (!target) {
    const sourceRect = touchDragState.sourceRow.getBoundingClientRect();
    if (y >= sourceRect.top && y <= sourceRect.bottom) {
      touchDragState.targetIndex = null;
      touchDragState.insertAfter = false;
      return;
    }
    target = rows.reduce((closest, row) => {
      const rect = row.getBoundingClientRect();
      const distance = Math.abs(y - (rect.top + rect.height / 2));
      return !closest || distance < closest.distance ? { row, distance } : closest;
    }, null).row;
  }

  const rect = target.getBoundingClientRect();
  const insertAfter = y > rect.top + rect.height / 2;
  touchDragState.targetIndex = parseInt(target.dataset.index);
  touchDragState.insertAfter = insertAfter;
  target.classList.add(insertAfter ? "drop-line-bottom" : "drop-line-top");
}

function updateTouchAutoScroll(y) {
  if (!touchDragState) return;
  const edge = 78;
  const maxSpeed = 13;
  let speed = 0;
  if (y < edge) {
    speed = -Math.ceil(((edge - y) / edge) * maxSpeed);
  } else if (y > window.innerHeight - edge) {
    speed = Math.ceil(((y - (window.innerHeight - edge)) / edge) * maxSpeed);
  }

  touchDragState.autoScrollSpeed = speed;
  if (speed !== 0 && !touchDragState.autoScrollFrame) {
    touchDragState.autoScrollFrame = requestAnimationFrame(runTouchAutoScroll);
  }
}

function runTouchAutoScroll() {
  if (!touchDragState) return;
  if (touchDragState.autoScrollSpeed !== 0) {
    window.scrollBy(0, touchDragState.autoScrollSpeed);
    updateTouchDropTarget(touchDragState.latestY);
    touchDragState.autoScrollFrame = requestAnimationFrame(runTouchAutoScroll);
  } else {
    touchDragState.autoScrollFrame = null;
  }
}

function finishTouchRankDrag() {
  if (!touchDragState) return;
  const { sourceIndex, targetIndex, insertAfter, sourceRow, ghost, autoScrollFrame } = touchDragState;
  if (autoScrollFrame) cancelAnimationFrame(autoScrollFrame);
  clearTouchDropMarkers();
  sourceRow.classList.remove("touch-drag-source");
  ghost.remove();
  document.body.classList.remove("rank-touch-dragging");
  touchDragState = null;

  if (targetIndex === null || targetIndex === sourceIndex) return;
  moveMovie(sourceIndex, targetIndex, insertAfter);
}

function cancelTouchRankDrag() {
  if (!touchDragState) return;
  const { sourceRow, ghost, autoScrollFrame } = touchDragState;
  if (autoScrollFrame) cancelAnimationFrame(autoScrollFrame);
  clearTouchDropMarkers();
  sourceRow.classList.remove("touch-drag-source");
  ghost.remove();
  document.body.classList.remove("rank-touch-dragging");
  touchDragState = null;
}

function moveMovie(fromIdx, toIdx, insertAfter) {
  const list = [...myRanked()];
  if (fromIdx < 0 || fromIdx >= list.length || toIdx < 0 || toIdx >= list.length) return;
  const [movie] = list.splice(fromIdx, 1);
  let newIndex = toIdx;
  if (fromIdx < toIdx) newIndex--;
  if (insertAfter) newIndex++;
  newIndex = Math.max(0, Math.min(newIndex, list.length));
  list.splice(newIndex, 0, movie);
  saveRankingToCloud(currentUser, list).catch(() => showToast("Erreur d'enregistrement"));
  renderRanked();
  if (newIndex === 0) {
    setTimeout(() => {
      const firstCard = document.querySelector('.rank-card[data-pos="1"] .rank-badge');
      if (firstCard) fireConfetti(firstCard);
    }, 80);
  }
}

function openRecommendSheet(movie) {
  const others = PROFILES.filter(p => p.id !== currentUser);
  const poster = movie.poster_path ? TMDB_IMG + movie.poster_path : "";
  document.getElementById("recommend-preview").innerHTML = `
    ${poster ? `<img src="${poster}" alt="">` : ""}
    <div class="context-preview-title">${escapeHtml(movie.title)}</div>
  `;
  document.getElementById("recommend-targets").innerHTML = others.length ? others.map(p => `
    <div class="context-item recommend-target" data-id="${escapeAttr(p.id)}">
      ${profileAvatarHtml(p.id, 28)}
      <span>Envoyer à ${escapeHtml(p.name)}</span>
    </div>
  `).join("") : `<div class="context-empty">Aucun autre profil</div>`;
  document.getElementById("recommend-overlay").classList.add("show");

  document.querySelectorAll(".recommend-target").forEach(item => {
    item.addEventListener("click", async () => {
      try {
        await sendRecoToUser(item.dataset.id, movie);
        const targetProfile = profileById(item.dataset.id);
        showToast(`Envoyé à ${targetProfile?.name || "ce profil"} 👋`);
        closeRecommendSheet();
      } catch (e) {
        showToast("Erreur d'envoi");
      }
    });
  });
}
function closeRecommendSheet() {
  document.getElementById("recommend-overlay").classList.remove("show");
}

function setupPwaInstallMetadata() {
  const iconSvg = `
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="112" fill="#F6F4FC"/>
      <circle cx="256" cy="256" r="178" fill="#FFFFFF"/>
      <path d="M150 210h212l-22 156H172z" fill="#C9B8FF"/>
      <path d="M158 154h210l-10 62H148z" fill="#FFD9A0"/>
      <circle cx="214" cy="184" r="18" fill="#FF9EB5"/>
      <circle cx="284" cy="184" r="18" fill="#A8E6CF"/>
      <circle cx="330" cy="184" r="14" fill="#A8D8FF"/>
    </svg>`;
  const iconUrl = `data:image/svg+xml,${encodeURIComponent(iconSvg)}`;
  const appleIcon = document.createElement("link");
  appleIcon.rel = "apple-touch-icon";
  appleIcon.href = iconUrl;
  document.head.appendChild(appleIcon);

  const manifest = {
    name: "Le Top",
    short_name: "Le Top",
    start_url: location.href.split("#")[0],
    scope: new URL(".", location.href).href,
    display: "standalone",
    background_color: "#F6F4FC",
    theme_color: "#F6F4FC",
    icons: [{ src: iconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }]
  };
  const manifestUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" }));
  const manifestLink = document.createElement("link");
  manifestLink.rel = "manifest";
  manifestLink.href = manifestUrl;
  document.head.appendChild(manifestLink);
}
function isStandaloneApp() {
  return window.navigator.standalone === true || window.matchMedia("(display-mode: standalone)").matches;
}
function openInstallSheet() {
  if (isStandaloneApp()) {
    showToast("Le Top est déjà sur l'écran d'accueil");
    return;
  }
  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.finally(() => { deferredInstallPrompt = null; });
    return;
  }
  document.getElementById("install-overlay").classList.add("show");
}
function closeInstallSheet() {
  document.getElementById("install-overlay").classList.remove("show");
}

function openContextMenu(index) {
  const movie = myRanked()[index];
  if (!movie) return;
  activeContextIndex = index;
  const poster = movie.poster_path ? TMDB_IMG + movie.poster_path : "";
  document.getElementById("context-preview").innerHTML = `
    ${poster ? `<img src="${poster}" alt="">` : ""}
    <div class="context-preview-title">${escapeHtml(movie.title)}</div>
  `;
  document.getElementById("context-overlay").classList.add("show");
}
function closeContextMenu() {
  document.getElementById("context-overlay").classList.remove("show");
  activeContextIndex = null;
}

async function ensureGenreData() {
  if (!currentUser) return;
  const list = myRanked();
  const missing = list.filter(m => !m.genre_ids || !m.genre_ids.length);
  if (!missing.length) return;
  await Promise.all(missing.map(async (m) => {
    try {
      const details = await getMovieDetails(m.id);
      m.genre_ids = (details.genres || []).map(g => g.id);
    } catch(e) { m.genre_ids = []; }
  }));
  await saveRankingToCloud(currentUser, list).catch(() => showToast("Erreur d'enregistrement"));
}

function computeGenreWeights(list) {
  const weights = {};
  const n = list.length;
  list.forEach((m, i) => {
    const positionWeight = n - i;
    (m.genre_ids || []).forEach(gid => { weights[gid] = (weights[gid] || 0) + positionWeight; });
  });
  return weights;
}

function scoreCandidate(candidate, genreWeights) {
  const genres = candidate.genre_ids || [];
  if (!genres.length) return 0;
  let score = 0;
  genres.forEach(gid => { score += (genreWeights[gid] || 0); });
  score = score / genres.length;
  score += (candidate.vote_average || 0) * 2;
  return score;
}

async function updateRecommendations() {
  const scroll = document.getElementById("reco-scroll");
  if (!scroll) return;
  const requestId = ++recommendationRequestSeq;
  const userId = currentUser;
  const list = myRanked();

  if (list.length === 0) {
    scroll.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--ink-soft);font-weight:600">Classe des films pour avoir des recommandations</div>`;
    return;
  }

  scroll.innerHTML = `<div style="padding:20px"><span class="loading-spin"></span></div>`;

  try {
    await ensureGenreData();
    if (requestId !== recommendationRequestSeq || userId !== currentUser || !document.body.contains(scroll)) return;
    const freshList = myRanked();
    const genreWeights = computeGenreWeights(freshList);

    const top3 = freshList.slice(0, 3);
    const next3 = freshList.slice(3, 6);
    const sourcePool = [...top3, ...top3, ...next3];
    const sample = [...sourcePool].sort(() => Math.random() - 0.5).slice(0, 5);
    const uniqueSample = [...new Map(sample.map(m => [m.id, m])).values()];

    const allIds = getAllMovieIdsForUser(currentUser);
    const results = await Promise.all(
      uniqueSample.map(async (m) => {
        const recos = await getRecommendations(m.id);
        return recos.map(r => ({ ...r, because: m.title }));
      })
    );
    if (requestId !== recommendationRequestSeq || userId !== currentUser || !document.body.contains(scroll)) return;

    const seen = new Set(); const merged = [];
    results.flat().forEach(r => {
      if (!seen.has(r.id) && !allIds.has(r.id)) { seen.add(r.id); merged.push(r); }
    });

    merged.forEach(m => { m._score = scoreCandidate(m, genreWeights); });
    const scoredSorted = merged.filter(m => m._score > 0).sort((a,b) => b._score - a._score);
    const fallback = merged.filter(m => m._score === 0).sort((a,b) => (b.vote_average||0) - (a.vote_average||0));
    const final = [...scoredSorted, ...fallback].slice(0, 10);

    if (!final.length) {
      scroll.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--ink-soft);font-weight:600">Classe plus de films pour avoir des recos</div>`;
      return;
    }

    scroll.innerHTML = final.map(m => {
      const poster = m.poster_path ? TMDB_IMG + m.poster_path : "";
      const title = escapeHtml(m.title);
      const year = m.release_date ? escapeHtml(m.release_date.slice(0,4)) : "?";
      const rating = m.vote_average ? Number(m.vote_average).toFixed(1) : "—";
      return `
      <div class="reco-item">
        ${poster ? `<img src="${poster}" alt="${escapeAttr(m.title)}">` : `<div style="aspect-ratio:2/3;background:#eee"></div>`}
        <div class="reco-item-body">
          <div class="reco-item-title">${title}</div>
          <div class="reco-item-meta">${year} · ⭐${rating}</div>
          <button class="reco-add-btn" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(m)))}'>+ Ajouter</button>
        </div>
      </div>`;
    }).join("");

    scroll.querySelectorAll(".reco-add-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        addToRanked(JSON.parse(btn.dataset.movie));
        btn.textContent = "✓"; btn.disabled = true;
      });
    });
  } catch (e) {
    if (requestId !== recommendationRequestSeq || userId !== currentUser || !document.body.contains(scroll)) return;
    scroll.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--ink-soft);font-weight:600">Erreur de chargement</div>`;
  }
}

function renderRecentFeed() {
  const el = document.getElementById("recent-list");

  const entries = [];
  Object.entries(allRankings).forEach(([userId, list]) => {
    const profile = PROFILES.find(p => p.id === userId);
    if (!profile) return;
    list.forEach((m, i) => {
      entries.push({ movie: m, userId, profile, position: i + 1, addedAt: m.addedAt || 0 });
    });
  });

  const byMovie = {};
  entries.forEach(e => {
    if (!byMovie[e.movie.id]) byMovie[e.movie.id] = { movie: e.movie, raters: [], latestAddedAt: 0 };
    byMovie[e.movie.id].raters.push({ profile: e.profile, position: e.position });
    byMovie[e.movie.id].latestAddedAt = Math.max(byMovie[e.movie.id].latestAddedAt, e.addedAt);
  });

  const grouped = Object.values(byMovie).sort((a,b) => b.latestAddedAt - a.latestAddedAt).slice(0, 20);

  if (!grouped.length) {
    el.innerHTML = `<div class="empty-state" style="margin:0">Personne n'a encore classé de film</div>`;
    return;
  }

  el.innerHTML = grouped.map(g => {
    const poster = g.movie.poster_path ? TMDB_IMG + g.movie.poster_path : "";
    return `
    <div class="recent-row">
      ${poster ? `<img class="recent-poster" src="${poster}" alt="${escapeAttr(g.movie.title)}">` : `<div class="recent-poster" style="background:#E8E4F5"></div>`}
      <div class="recent-info">
        <div class="recent-title">${escapeHtml(g.movie.title)}</div>
        <div class="recent-raters">
          ${g.raters.map(r => `
            <span class="rater-chip" style="--pc:${escapeAttr(r.profile.color)}">
              <span class="rater-initial">${escapeHtml(r.profile.initial)}</span>
              #${r.position}
            </span>
          `).join("")}
        </div>
      </div>
    </div>`;
  }).join("");
}

document.addEventListener("DOMContentLoaded", () => {
  setupPwaInstallMetadata();
  renderBootLoading();

  setTimeout(() => {
    if (!profilesSynced || (currentUser && !rankingsSynced)) {
      profilesSynced = true;
      rankingsSynced = true;
      renderPage();
    }
  }, 3500);

  document.getElementById("context-overlay").addEventListener("click", (e) => {
    if (e.target.id === "context-overlay") closeContextMenu();
  });
  document.getElementById("recommend-overlay").addEventListener("click", (e) => {
    if (e.target.id === "recommend-overlay") closeRecommendSheet();
  });
  document.getElementById("install-overlay").addEventListener("click", (e) => {
    if (e.target.id === "install-overlay") closeInstallSheet();
  });
  document.getElementById("btn-close-install").addEventListener("click", closeInstallSheet);
  document.getElementById("rating-overlay").addEventListener("click", (e) => {
    if (e.target.id === "rating-overlay") closeRatingSheet();
  });
  document.getElementById("btn-cancel-rating").addEventListener("click", closeRatingSheet);
  document.querySelectorAll(".context-item").forEach(item => {
    item.addEventListener("click", () => {
      if (activeContextIndex === null) return;
      const action = item.dataset.action;
      const i = activeContextIndex;
      const list = [...myRanked()];
      if (i < 0 || i >= list.length) {
        closeContextMenu();
        return;
      }

      if (action === "top" && i !== 0) {
        const [movie] = list.splice(i, 1);
        list.unshift(movie);
        saveRankingToCloud(currentUser, list).catch(() => showToast("Erreur d'enregistrement"));
        renderRanked();
        setTimeout(() => {
          const firstBadge = document.querySelector('.rank-card[data-pos="1"] .rank-badge');
          if (firstBadge) fireConfetti(firstBadge);
        }, 80);
        showToast(`${movie.title} en N°1 🏆`);
      } else if (action === "up" && i > 0) {
        [list[i-1], list[i]] = [list[i], list[i-1]];
        saveRankingToCloud(currentUser, list).catch(() => showToast("Erreur d'enregistrement"));
        renderRanked();
      } else if (action === "down" && i < list.length - 1) {
        [list[i+1], list[i]] = [list[i], list[i+1]];
        saveRankingToCloud(currentUser, list).catch(() => showToast("Erreur d'enregistrement"));
        renderRanked();
      } else if (action === "remove") {
        const [movie] = list.splice(i, 1);
        saveRankingToCloud(currentUser, list).catch(() => showToast("Erreur d'enregistrement"));
        renderRanked();
        showToast(`${movie.title} retiré`);
      }
      closeContextMenu();
    });
  });

  listenProfiles((list, metadata) => {
    PROFILES = list;
    const serverConfirmed = !metadata.fromCache && !metadata.failed;
    if (serverConfirmed) profilesServerConfirmed = true;
    const currentProfileExists = !currentUser || list.some(p => p.id === currentUser);
    const canRenderProfiles = list.length > 0 || serverConfirmed || metadata.failed;

    // On ne considère pas un snapshot vide depuis le cache comme une vérité :
    // au démarrage, il peut arriver avant la synchro serveur et ne doit pas
    // effacer la session locale ni afficher l'écran "aucun profil".
    if (!canRenderProfiles || (currentUser && !currentProfileExists && !serverConfirmed && !onboardingNewUser)) {
      renderBootLoading();
      return;
    }

    profilesSynced = true;
    if (!onboardingNewUser && serverConfirmed) normalizeActiveUsers();
    if (currentUser && !viewingUser) viewingUser = currentUser;
    renderPage();
  });
  listenAllRankings(data => {
    allRankings = data;
    rankingsSynced = true;
    renderPage();
  });
  listenAllWatched(data => {
    allWatched = data;
    if (profilesSynced && rankingsSynced && currentUser && activeTab === "watched") renderWatchedList();
  });
  listenAllWatchlist(data => {
    allWatchlist = data;
    if (profilesSynced && rankingsSynced && currentUser && activeTab === "watchlist") renderWatchlist();
  });
  listenIncomingRecos(data => {
    incomingRecos = data;
    if (profilesSynced && rankingsSynced && currentUser && !onboardingNewUser) renderPage();
  });
});
</script>

}

  cursor: pointer; transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);

.tab-content { padding-bottom: 24px; animation: tab-content-in 0.22s ease; }
@keyframes tab-content-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.app-tabbar-wrap {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 350;
  padding: 0 12px calc(env(safe-area-inset-bottom, 0px) + 10px);
  pointer-events: none;
}
.app-tabbar {
  margin: 0 auto; width: min(520px, 100%); height: 74px; display: flex; align-items: center;
  padding: 9px 9px 15px; border-radius: 24px 24px 32px 32px; background: rgba(255,255,255,0.94);
  box-shadow: 8px 8px 22px var(--shadow-d), -8px -8px 22px var(--shadow-l);
  backdrop-filter: blur(18px) saturate(1.25); position: relative; pointer-events: auto;
}
.app-tabbar::after {
  content: ""; position: absolute; left: 50%; bottom: 7px; width: 34%; height: 5px;
  transform: translateX(-50%); border-radius: 999px; background: rgba(199,194,221,0.25);
}
.app-tab-item {
  all: unset; flex: 1; min-width: 0; height: 50px; display: flex; align-items: center; justify-content: center;
  color: #CDD2D7; position: relative; overflow: hidden; border-radius: 18px; cursor: pointer;
  transition: flex 0.45s cubic-bezier(0.4,0,0.2,1), color 0.35s cubic-bezier(0.4,0,0.2,1);
}
.app-tab-item::before {
  content: ""; position: absolute; left: 50%; top: 50%; width: 28px; height: 28px; border-radius: 50%;
  background: #FDECEF; background: color-mix(in srgb, var(--tab-color) 28%, white); opacity: 0;
  transform: translate(-50%, -50%) scale(0.25); transition: transform 0.45s cubic-bezier(.34,1.56,.64,1), opacity 0.25s;
}
.app-tab-item::after {
  content: ""; position: absolute; left: 52px; bottom: 5px; width: 34px; height: 3px;
  border-radius: 99px; background: currentColor; transform: scaleX(0); transform-origin: left center;
  transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
}
.app-tab-item.active { flex: 2.45; color: var(--lav-deep); color: color-mix(in srgb, var(--tab-color) 70%, var(--lav-deep)); }
.app-tab-item.active::before { opacity: 1; transform: translate(calc(-50% - 36px), -50%) scale(1); }
.app-tab-item.active::after { transform: scaleX(1); }
.app-tab-icon { width: 30px; height: 30px; display: grid; place-items: center; position: relative; z-index: 1; transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); }
.app-tab-item.active .app-tab-icon { transform: translateX(-36px); }
.app-tab-text {
  position: absolute; left: 54px; top: 14px; font-size: 15px; font-weight: 800; letter-spacing: 0;
  transform: translateY(150%); opacity: 0; transition: transform 0.22s ease, opacity 0.18s ease;
}
.app-tab-item.active .app-tab-text { transform: translateY(0); opacity: 1; transition-delay: 0.12s; }
.tab-svg { width: 27px; height: 27px; display: block; }
.app-tab-item.active[data-tab="top"] .tab-svg { animation: tab-crown-pop 0.7s cubic-bezier(.34,1.56,.64,1); }

@keyframes tab-crown-pop { 0% { transform: translateY(0) scale(1); } 35% { transform: translateY(-4px) scale(1.08); } 70% { transform: translateY(2px) scale(0.96); } 100% { transform: translateY(0) scale(1); } }

.context-empty { padding: 12px; color: var(--ink-soft); font-size: 13px; font-weight: 700; text-align: center; }
.install-title { font-weight: 800; font-size: 18px; padding: 4px 10px 6px; }
.install-text { color: var(--ink-soft); font-size: 13px; line-height: 1.55; font-weight: 600; padding: 0 10px 10px; }
.install-steps { display: flex; flex-direction: column; gap: 8px; padding: 0 4px 10px; }
.install-step { background: var(--bg); border-radius: 14px; padding: 12px; font-size: 13px; font-weight: 700; color: var(--ink); }
.install-step span { display: inline-flex; width: 24px; height: 24px; align-items: center; justify-content: center; margin-right: 8px; border-radius: 50%; background: var(--lav); color: white; font-size: 11px; }
.rating-subtitle { font-family: 'DM Mono', monospace; color: var(--ink-soft); font-size: 11px; margin-top: 3px; }
.rating-options { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 0 6px 12px; }
.rating-choice {
  border: none; border-radius: 14px; background: var(--bg); color: var(--ink);
  height: 44px; font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 800;
  box-shadow: 3px 3px 7px var(--shadow-d), -3px -3px 7px var(--shadow-l);
}
.rating-choice:active {
  box-shadow: inset 3px 3px 7px var(--shadow-d), inset -3px -3px 7px var(--shadow-l);
  transform: scale(0.95);
}

.confetti-piece { position: fixed; width: 7px; height: 7px; top: 50%; left: 50%; border-radius: 2px; pointer-events: none; z-index: 600; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px) scale(0.9);
  background: var(--ink); color: white; padding: 13px 22px; border-radius: 16px; font-size: 13px; font-weight: 600;
  opacity: 0; transition: all 0.3s cubic-bezier(.34,1.56,.64,1); z-index: 2000; pointer-events: none;
  box-shadow: 0 10px 30px rgba(45,42,61,0.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

.modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(45,42,61,0.4); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--card); border-radius: 28px; padding: 30px; max-width: 420px; width: 100%; box-shadow: 10px 10px 30px var(--shadow-d), -10px -10px 30px var(--shadow-l); }
.modal-emoji { font-size: 34px; margin-bottom: 10px; }
.modal-title { font-weight: 800; font-size: 21px; margin-bottom: 10px; }
.modal-text { font-size: 13.5px; color: var(--ink-soft); line-height: 1.65; margin-bottom: 18px; font-weight: 500; }
.modal-text a { color: var(--lav-deep); font-weight: 700; }
.modal-text ol { margin: 10px 0 10px 18px; }
.modal-text li { margin-bottom: 6px; }
.modal-input { width: 100%; background: var(--bg); border: none; border-radius: 14px; padding: 14px 16px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; margin-bottom: 14px; box-shadow: inset 3px 3px 7px var(--shadow-d), inset -3px -3px 7px var(--shadow-l); }
.modal-error { color: #d64668; font-size: 12px; margin-bottom: 12px; font-weight: 600; display: none; }
.btn-primary { width: 100%; background: var(--lav); color: white; border: none; padding: 15px; border-radius: 16px; font-weight: 700; font-size: 15px; cursor: pointer; transition: transform 0.12s; font-family: 'Plus Jakarta Sans', sans-serif; }
.btn-primary:active { transform: scale(0.96); }

.loading-spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--ink-faint); border-top-color: var(--lav); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.boot-loading {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.boot-loading .loading-spin { width: 28px; height: 28px; border-width: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<div class="context-overlay" id="context-overlay">
  <div class="context-sheet" id="context-sheet">
    <div class="context-handle"></div>
    <div class="context-preview" id="context-preview"></div>
    <div class="context-item" data-action="top"><span class="ic">🏆</span> Mettre en N°1</div>
    <div class="context-item" data-action="up"><span class="ic">⬆️</span> Monter d'une place</div>
    <div class="context-item" data-action="down"><span class="ic">⬇️</span> Descendre d'une place</div>
    <div class="context-divider"></div>
    <div class="context-item danger" data-action="remove"><span class="ic">🗑️</span> Retirer du classement</div>
  </div>
</div>

<div class="context-overlay" id="recommend-overlay">
  <div class="context-sheet">
    <div class="context-handle"></div>
    <div class="context-preview" id="recommend-preview"></div>
    <div id="recommend-targets"></div>
  </div>
</div>

<div class="context-overlay" id="install-overlay">
  <div class="context-sheet">
    <div class="context-handle"></div>
    <div class="install-title">Ajouter Le Top à l'écran d'accueil</div>
    <div class="install-text">Sur iPhone, Safari demande une action manuelle.</div>
    <div class="install-steps">
      <div class="install-step"><span>1</span>Ouvre cette page dans Safari</div>
      <div class="install-step"><span>2</span>Appuie sur le bouton Partager</div>
      <div class="install-step"><span>3</span>Choisis "Sur l'écran d'accueil"</div>
      <div class="install-step"><span>4</span>Appuie sur "Ajouter"</div>
    </div>
    <button class="btn-primary" id="btn-close-install">OK</button>
  </div>
</div>

<div class="context-overlay" id="rating-overlay">
  <div class="context-sheet">
    <div class="context-handle"></div>
    <div class="context-preview" id="rating-preview"></div>
    <div class="rating-options" id="rating-options"></div>
    <button class="btn-secondary" id="btn-cancel-rating">Annuler</button>
  </div>
</div>

<div class="toast" id="toast"></div>
</body>
</html>
