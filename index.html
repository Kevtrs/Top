function slugify(name) {
  return name.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // enlève les accents
    .replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
}
function profileNameFromId(profileId) {
  return String(profileId || "Profil")
    .split("-")
    .filter(Boolean)
    .map(part => part[0]?.toUpperCase() + part.slice(1))
    .join(" ") || "Profil";
}
function profilePayload(userId, preferredName = "") {
  const existing = profileById(userId) || {};
  const storedName = userId === currentUser ? (localStorage.getItem(USER_NAME_KEY) || "") : "";
  const name = (preferredName || existing.name || storedName || profileNameFromId(userId)).trim();
  return {
    id: userId,
    name,
    initial: existing.initial || name[0]?.toUpperCase() || "?",
    color: existing.color || PROFILE_COLORS[Math.max(PROFILES.length + PROFILE_INDEX.length, 0) % PROFILE_COLORS.length],
    createdAt: existing.createdAt || Date.now(),
    updatedAt: Date.now()
  };
}
function profileMetaPayload(profile) {
  return {
    profile,
    profileId: profile.id,
    profileName: profile.name,
    profileUpdatedAt: Date.now()
  };
}
function profileFromDataDoc(raw, fallbackId) {
  return normalizeProfileData(raw?.profile || {
    id: raw?.profileId,
    name: raw?.profileName,
    initial: raw?.profileInitial,
    color: raw?.profileColor,
    createdAt: raw?.profileCreatedAt
  }, fallbackId);
}
function updateProfileDocSource(source, profiles) {
  PROFILE_DOC_SOURCES[source] = profiles.map(p => normalizeProfileData(p, p.id)).filter(p => p.id);
  const map = new Map();
  Object.values(PROFILE_DOC_SOURCES).flat().forEach(profile => {
    const normalized = normalizeProfileData(profile, profile.id);
    if (!normalized.id) return;
    map.set(normalized.id, { ...(map.get(normalized.id) || {}), ...normalized });
  });
  DATA_PROFILES = [...map.values()];
}
function forgetLocalProfile(userId) {
  PROFILES = PROFILES.filter(p => p.id !== userId);
  PROFILE_INDEX = PROFILE_INDEX.filter(p => p.id !== userId);
  DATA_PROFILES = DATA_PROFILES.filter(p => p.id !== userId);
  Object.keys(PROFILE_DOC_SOURCES).forEach(source => {
    PROFILE_DOC_SOURCES[source] = PROFILE_DOC_SOURCES[source].filter(p => p.id !== userId);
  });
  publishedProfileIds.delete(userId);
}
async function createProfile(id, name) {
  const payload = profilePayload(id, name);
  const meta = profileMetaPayload(payload);
  const writes = await Promise.allSettled([
    setDoc(doc(db, "profiles", id), payload, { merge: true }),
    setDoc(doc(db, "profileIndex", id), payload, { merge: true }),
    setDoc(doc(db, "rankings", id), meta, { merge: true }),
    setDoc(doc(db, "watched", id), meta, { merge: true }),
    setDoc(doc(db, "watchlist", id), meta, { merge: true })
  ]);
  if (!writes.some(result => result.status === "fulfilled")) throw new Error("profile-write-failed");
  PROFILES = [...PROFILES.filter(p => p.id !== id), payload];
  PROFILE_INDEX = [...PROFILE_INDEX.filter(p => p.id !== id), payload];
  updateProfileDocSource("rankings", [...PROFILE_DOC_SOURCES.rankings.filter(p => p.id !== id), payload]);
  publishedProfileIds.add(id);
}
async function ensureProfileInCloud(userId, preferredName = "") {
  if (!userId || repairingProfileIds.has(userId) || publishedProfileIds.has(userId)) return;
  repairingProfileIds.add(userId);
  const payload = profilePayload(userId, preferredName);
  try {
    const meta = profileMetaPayload(payload);
    const writes = await Promise.allSettled([
      setDoc(doc(db, "profiles", userId), payload, { merge: true }),
      setDoc(doc(db, "profileIndex", userId), payload, { merge: true }),
      setDoc(doc(db, "rankings", userId), meta, { merge: true }),
      setDoc(doc(db, "watched", userId), meta, { merge: true }),
      setDoc(doc(db, "watchlist", userId), meta, { merge: true })
    ]);
    if (!writes.some(result => result.status === "fulfilled")) throw new Error("profile-write-failed");
    PROFILES = [...PROFILES.filter(p => p.id !== userId), payload];
    PROFILE_INDEX = [...PROFILE_INDEX.filter(p => p.id !== userId), payload];
    updateProfileDocSource("rankings", [...PROFILE_DOC_SOURCES.rankings.filter(p => p.id !== userId), payload]);
    publishedProfileIds.add(userId);
  } catch (e) {
    showToast("Profil pas encore synchronisé");
  } finally {
    repairingProfileIds.delete(userId);
  }
}
function listenProfiles(cb) {
  return onSnapshot(collection(db, "profiles"), { includeMetadataChanges: true }, snap => {
    const list = [];
    snap.forEach(d => list.push(normalizeProfileData(d.data(), d.id)));
    list.sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
    cb(list, snap.metadata);
  }, () => cb([], { fromCache: false, hasPendingWrites: false, failed: true }));
}
function listenProfileIndex(cb) {

    const list = [];

    list.sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
    cb(list);
  }, () => cb([]));
}

async function tmdbFetch(path, params = {}) {
  const url = new URL(`https://api.themoviedb.org/3${path}`);
  url.searchParams.set("api_key", TMDB_API_KEY);
  url.searchParams.set("language", "fr-FR");
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url);
  if (!res.ok) throw new Error("TMDB " + res.status);
  return res.json();
}
async function searchMovies(q) {
  if (!q.trim()) return [];
  const data = await tmdbFetch("/search/movie", { query: q, include_adult: "false" });
  return data.results || [];
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[ch]));
}
function escapeAttr(value) { return escapeHtml(value); }
function simplifyMovie(m) {
  return {
    id: m.id, title: m.title, poster_path: m.poster_path,
    release_date: m.release_date, vote_average: m.vote_average,
    genre_ids: m.genre_ids || [], addedAt: Date.now()
  };
}

function profileById(profileId) {
  return PROFILES.find(pr => pr.id === profileId) || PROFILE_INDEX.find(pr => pr.id === profileId) || DATA_PROFILES.find(pr => pr.id === profileId) || null;
}
function fallbackProfile(profileId) {
  const label = String(profileId || "profil");
  return {
    id: profileId,
    name: label,
    initial: label.trim()[0]?.toUpperCase() || "?",
    color: "var(--lav)"
  };
}
function normalizeProfileData(profile, fallbackId) {
  const id = profile?.id || profile?.profileId || fallbackId;
  const name = profile?.name || profile?.profileName || (id ? profileNameFromId(id) : "Profil");
  return {
    id,
    name,
    initial: profile?.initial || profile?.profileInitial || name.trim()[0]?.toUpperCase() || "?",
    color: profile?.color || profile?.profileColor || "var(--lav)",
    createdAt: profile?.createdAt || profile?.profileCreatedAt || 0
  };
}
function hasProfile(profileId) {
  return !!profileById(profileId);
}
function allKnownProfiles() {
  const map = new Map();
  const addProfile = (profile, fallbackId) => {
    const normalized = normalizeProfileData(profile, fallbackId);
    if (!normalized.id) return;
    map.set(normalized.id, { ...(map.get(normalized.id) || {}), ...normalized });
  };

  DATA_PROFILES.forEach(p => addProfile(p, p.id));
  PROFILE_INDEX.forEach(p => addProfile(p, p.id));
  PROFILES.forEach(p => addProfile(p, p.id));
  Object.keys(allRankings).forEach(id => addProfile(profileById(id), id));
  Object.keys(allWatched).forEach(id => addProfile(profileById(id), id));
  Object.keys(allWatchlist).forEach(id => addProfile(profileById(id), id));
  incomingRecos.forEach(r => {
    addProfile(profileById(r.from), r.from);
    addProfile(profileById(r.to), r.to);
  });

  return [...map.values()].sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0) || a.name.localeCompare(b.name));
}
function friendProfiles() {

function isPushConfigured() {
  return FCM_VAPID_KEY.trim().length > 20;
}
function isHttpsLike() {
  return location.protocol === "https:" || location.hostname === "localhost";
}
function isIosDevice() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}
function isAndroidDevice() {
  return /Android/i.test(navigator.userAgent);
}
function isMobileDevice() {
  return isIosDevice() || isAndroidDevice();
}
function devicePlatform() {
  if (isIosDevice()) return "ios";
  if (isAndroidDevice()) return "android";
  return "desktop";
}
function applyPlatformMode() {
  const platform = devicePlatform();
  document.documentElement.dataset.platform = platform;
  document.body?.setAttribute("data-platform", platform);
  document.documentElement.classList.toggle("is-ios", platform === "ios");
  document.documentElement.classList.toggle("is-android", platform === "android");
  document.documentElement.classList.toggle("is-desktop", platform === "desktop");
  document.documentElement.classList.toggle("is-standalone", isStandaloneApp());
}

function canUsePushHere() {
  return "serviceWorker" in navigator && "Notification" in window && isHttpsLike();
}
function shouldForceInstallGate() {
  return isMobileDevice() && !isStandaloneApp();
}
function shouldForceNotificationGate() {
  if (!isMobileDevice() || !isStandaloneApp()) return false;
  if (!isPushConfigured() || !("Notification" in window)) return false;
  return Notification.permission !== "granted";
}
function tokenDocId(token) {
  let hash = 0;
  for (let i = 0; i < token.length; i++) hash = ((hash << 5) - hash + token.charCodeAt(i)) | 0;
  const safeStart = token.slice(0, 18).replace(/[^A-Za-z0-9_-]/g, "_");
  return `${safeStart}_${Math.abs(hash).toString(36)}`;
}
function pushBellIcon() {

function renderBootLoading() {
  document.getElementById("root").innerHTML = `<div class="boot-loading">${appLogoHtml("boot-logo")}<span class="loading-spin"></span></div>`;
  scheduleScrollLockUpdate();
}
function scheduleScrollLockUpdate() {
  if (scrollLockFrame) cancelAnimationFrame(scrollLockFrame);
  scrollLockFrame = requestAnimationFrame(updatePageScrollLock);
}
function updatePageScrollLock() {
  scrollLockFrame = null;
  const root = document.getElementById("root");
  if (!root) return;
  const tabbar = document.querySelector(".app-tabbar-wrap");
  const tabbarHeight = tabbar ? tabbar.getBoundingClientRect().height : 0;
  const reservedBottom = tabbar ? Math.min(tabbarHeight, window.innerHeight * 0.28) : 0;
  const availableHeight = Math.max(0, window.innerHeight - reservedBottom);
  const contentHeight = Math.ceil(root.scrollHeight);
  const pageNeedsScroll = contentHeight > availableHeight + 6;
  const overlayOpen = !!document.querySelector(".context-overlay.show");
  const shouldLock = overlayOpen || !pageNeedsScroll;

  document.documentElement.classList.toggle("no-page-scroll", shouldLock);
  document.body.classList.toggle("no-page-scroll", shouldLock);
  if (!pageNeedsScroll && window.scrollY !== 0) window.scrollTo(0, 0);
}
function canTouchScrollInside(target) {
  const scrollable = target?.closest?.(".context-sheet, .reco-scroll, .profile-switcher-tab");
  if (!scrollable) return false;
  return scrollable.scrollHeight > scrollable.clientHeight || scrollable.scrollWidth > scrollable.clientWidth;
}
function renderGateSteps(steps) {
  return steps.map((step, i) => `<div class="gate-step"><span>${i + 1}</span>${escapeHtml(step)}</div>`).join("");
}

function renderNotificationGate() {

  document.getElementById("root").innerHTML = `

      : "Autorise les notifications pour recevoir les films qu'on te recommande. L'app se lance juste après."}</div>
    <div class="gate-steps">

        "Crée ton profil ou reprends ton espace"
      ])}
    </div>
    <button class="btn-primary" id="btn-notification-gate">${denied ? "Réessayer" : "Autoriser les notifications"}</button>
  </div>`;

  document.getElementById("btn-notification-gate").addEventListener("click", async () => {
    const enabled = await enablePushNotifications({ allowWithoutProfile: true });
    if (enabled) renderPage();
  });
}
function normalizeActiveUsers() {
  if (!profilesServerConfirmed) {
    if (currentUser && !viewingUser) viewingUser = currentUser;
    return;
  }
  if (currentUser && !hasProfile(currentUser)) {
    ensureProfileInCloud(currentUser);
    if (!viewingUser) viewingUser = currentUser;
    return;
  }
  if (currentUser && !viewingUser) viewingUser = currentUser;
  if (viewingUser && !hasProfile(viewingUser)) viewingUser = currentUser || null;
}
function profileAvatarHtml(profileId, size) {
  const p = profileById(profileId) || { initial: "?", color: "var(--lav)" };
  const topMovie = (allRankings[profileId] || [])[0];
  if (topMovie?.poster_path) {
    return `<img class="avatar-poster" style="width:${size}px;height:${size}px" src="${TMDB_IMG + topMovie.poster_path}" alt="">`;
  }
  return `<span class="avatar-initial-sm" style="width:${size}px;height:${size}px;background:${escapeAttr(p.color)}">${escapeHtml(p.initial)}</span>`;
}

function renderCreateProfileScreen(canCancel = false) {
  document.getElementById("root").innerHTML = `
  <div class="onboard-screen">
    ${appLogoHtml("profile-logo-img")}
    <div class="onboard-step">TON PROFIL</div>
    <div class="onboard-title">Crée ton espace 🎬</div>
    <div class="onboard-text">Entre ton prénom. Les autres profils restent cachés, donc personne ne peut changer de compte depuis une liste.</div>
    <div class="search-box" id="newname-box" style="margin-top:18px">
      <span class="search-icon">✏️</span>
      <input type="text" id="newname-input" placeholder="Ton prénom..." maxlength="20">
    </div>
    <button class="btn-primary" id="btn-confirm-name" style="margin-top:16px">Continuer</button>
    ${canCancel ? `<button class="btn-secondary" id="btn-cancel-create" style="margin-top:10px">Annuler</button>` : ""}
    <button class="profile-install-btn" id="btn-install-profile">${installButtonLabel()}</button>
  </div>`;

  const input = document.getElementById("newname-input");
  const box = document.getElementById("newname-box");
  input.addEventListener("focus", () => box.classList.add("focused"));
  input.addEventListener("blur", () => box.classList.remove("focused"));
  input.focus();

  let submitting = false;
  const confirm = async () => {
    if (submitting) return;
    const name = input.value.trim();
    if (!name) { showToast("Entre un prénom"); return; }
    let id = slugify(name);
    if (!id) id = `profil-${Date.now()}`;
    const existingProfile = profileById(id);

    const btn = document.getElementById("btn-confirm-name");
    btn.innerHTML = `<span class="loading-spin"></span>`; btn.disabled = true;
    submitting = true;

    // IMPORTANT: on bascule l'état AVANT l'écriture Firestore, car setDoc()
    // déclenche le listener onSnapshot de façon quasi-synchrone, qui appelle
    // renderPage() — s'il voit encore creatingProfile=true, il réaffiche
    // l'écran de saisie du nom et écrase ce flux en cours.
    creatingProfile = false;
    currentUser = id;
    viewingUser = id;
    localStorage.setItem("letop_user", id);

    if (existingProfile) {
      localStorage.setItem(USER_NAME_KEY, existingProfile.name);
      const hasMovies = (allRankings[id] || []).length > 0;
      onboardingNewUser = hasMovies ? null : id;
      showToast(`Bon retour ${existingProfile.name}`);
      if (hasMovies) {
        renderPage();
      } else {
        renderOnboarding();
      }
      return;
    }

    onboardingNewUser = id;
    localStorage.setItem(USER_NAME_KEY, name);
    try {
      await createProfile(id, name);
      renderOnboarding();
    } catch (e) {
      creatingProfile = true;
      onboardingNewUser = null;
      currentUser = null;
      viewingUser = null;
      localStorage.removeItem("letop_user");
      localStorage.removeItem(USER_NAME_KEY);
      showToast("Erreur de création du profil");
      renderCreateProfileScreen();
    }
  };

  document.getElementById("btn-confirm-name").addEventListener("click", confirm);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") confirm(); });
  document.getElementById("btn-cancel-create")?.addEventListener("click", () => {
    creatingProfile = false;
    renderPage();
  });
  document.getElementById("btn-install-profile").addEventListener("click", openInstallSheet);
}

// ─── ONBOARDING — choisir son film n°1 (devient l'avatar) ─────────
function renderOnboarding() {
  const onboardingId = onboardingNewUser;
  const me = profileById(onboardingId) || { id: onboardingId, name: "toi" };
  document.getElementById("root").innerHTML = `
  <div class="onboard-screen">
    <div class="onboard-step">ÉTAPE 1/1</div>
    <div class="onboard-title">Salut ${escapeHtml(me.name)} 👋</div>
    <div class="onboard-text">Cherche ton film préféré — il deviendra ton numéro 1 <strong>et</strong> ta photo de profil.</div>
    <div class="search-box" id="onboard-search-box" style="margin-top:18px">
      <span class="search-icon">🔍</span>
      <input type="text" id="onboard-search-input" placeholder="Ton film n°1...">
    </div>
    <div id="onboard-results"></div>
  </div>`;

  const input = document.getElementById("onboard-search-input");
  const box = document.getElementById("onboard-search-box");
  input.addEventListener("focus", () => box.classList.add("focused"));
  input.addEventListener("blur", () => box.classList.remove("focused"));
  let t;
  let selectingMovie = false;
  input.addEventListener("input", (e) => {
    clearTimeout(t);
    const q = e.target.value;
    const zone = document.getElementById("onboard-results");
    if (!q.trim()) { zone.innerHTML = ""; return; }
    zone.innerHTML = `<div class="skeleton-grid">${Array(6).fill('<div class="skeleton-card"></div>').join("")}</div>`;
    t = setTimeout(async () => {
      try {
        const results = await searchMovies(q);
        if (!document.body.contains(zone) || input.value !== q || onboardingNewUser !== onboardingId) return;
        if (!results.length) { zone.innerHTML = `<div style="padding:16px;text-align:center;color:var(--ink-faint);font-size:13px;font-weight:600">Aucun résultat</div>`; return; }
        zone.innerHTML = `<div class="search-results">${results.slice(0,9).map(m => {
          const poster = m.poster_path ? TMDB_IMG + m.poster_path : "";
          const title = escapeHtml(m.title);
          const year = m.release_date ? ` (${escapeHtml(m.release_date.slice(0,4))})` : "";
          return `
          <div class="poster-pick" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(m)))}'>
            ${poster ? `<img src="${poster}" alt="${escapeAttr(m.title)}">` : `<div style="aspect-ratio:2/3;background:#E8E4F5"></div>`}
            <div class="poster-pick-title">${title}${year}</div>
          </div>`;
        }).join("")}</div>`;
        zone.querySelectorAll(".poster-pick").forEach(card => {
          card.addEventListener("click", async () => {
            if (selectingMovie) return;
            selectingMovie = true;
            card.style.pointerEvents = "none";
            const movie = JSON.parse(card.dataset.movie);
            const userId = onboardingNewUser;
            onboardingNewUser = null;
            try {
              await ensureProfileInCloud(userId, me.name);
              await saveRankingToCloud(userId, [movie]);
              showToast(`Bienvenue ${me.name} 🎬`);
            } catch (e) {
              onboardingNewUser = userId;
              showToast("Erreur d'enregistrement");
              renderOnboarding();
              return;
            }
            onboardingNewUser = null;
            renderPage();
          });
        });
      } catch(e) {
        if (!document.body.contains(zone) || input.value !== q || onboardingNewUser !== onboardingId) return;
        zone.innerHTML = `<div style="padding:16px;text-align:center;color:var(--ink-faint);font-size:13px;font-weight:600">Erreur de recherche</div>`;
      }
    }, 350);
  });
}

function renderActiveTabContent(viewed, myIncoming) {
  if (activeTab === "search") return renderSearchTabContent(myIncoming);
  if (activeTab === "watched") return renderWatchedTabContent();
  if (activeTab === "watchlist") return renderWatchlistTabContent();
  if (activeTab === "friends") return renderFriendsTabContent(viewed);
  return renderTopTabContent();
}

function renderApp() {
  const me = profileById(currentUser) || (currentUser ? fallbackProfile(currentUser) : null);
  if (!me) {
    normalizeActiveUsers();
    renderProfilePicker();
    return;
  }
  if (currentUser) ensureProfileInCloud(currentUser, me.name);
  let viewed = profileById(viewingUser) || (!profilesServerConfirmed && viewingUser ? fallbackProfile(viewingUser) : null);
  if (!viewed && activeTab === "friends") {
    viewed = friendProfiles().find(p => p.id === viewingUser) || null;
  }
  if (!viewed) {
    viewingUser = currentUser;
    viewed = me;
  }
  if (activeTab !== "friends") {
    viewingUser = currentUser;
    viewed = me;
  } else if (viewingUser === currentUser) {
    const firstFriend = friendProfiles()[0];
    if (firstFriend) {
      viewingUser = firstFriend.id;
      viewed = firstFriend;
    }
  }
  const myIncoming = incomingRecos.filter(r => r.to === currentUser && !r.seen);
  syncPendingPushTokenForCurrentUser();

  document.getElementById("root").innerHTML = `
    <div class="header">
      <div class="header-row">
        <div>
          <div class="brand-title">${appLogoHtml("brand-logo", "icon")}Le Top</div>
        </div>
        <div class="header-btns">
          <button class="icon-pill" id="btn-settings" title="Réglages">${tabIconHtml("settings")}</button>
        </div>
      </div>
    </div>

    <main class="tab-content">
      ${renderActiveTabContent(viewed, myIncoming)}
    </main>

    ${renderTabBar()}
  `;

  attachAppEvents();
  renderActiveTabView();

  // Marque les recos comme vues après un court délai (le temps qu'on les voie vraiment)
  if (activeTab === "search" && myIncoming.length) {
    setTimeout(() => myIncoming.forEach(r => markRecoSeen(r.docId).catch(() => {})), 2000);
  }
}

function renderPage() {
  applyPlatformMode();
  if (shouldForceInstallGate()) {
    renderInstallGate();
    return;
  }
  if (shouldForceNotificationGate()) {
    renderNotificationGate();
    return;
  }
  if (!profilesSynced && !creatingProfile && !onboardingNewUser) {
    renderBootLoading();
    return;
  }
  if (!rankingsSynced && !onboardingNewUser) {
    renderBootLoading();
    return;
  }
  if (currentUser && !rankingsSynced && !onboardingNewUser) {
    renderBootLoading();
    return;
  }
  if (onboardingNewUser) {
    renderOnboarding();
  } else if (!currentUser || creatingProfile) {
    renderProfilePicker();
  } else {
    renderApp();
  }
}

function renderActiveTabView() {
  if (activeTab === "search") {
    if (recoExpanded) updateRecommendations();
    if (recentExpanded) renderRecentFeed();
  } else if (activeTab === "watched") {
    renderWatchedList();
  } else if (activeTab === "watchlist") {
    renderWatchlist();
  } else if (activeTab === "top" || activeTab === "friends") {
    renderRanked();
  }
}

function fireConfetti(originEl) {
  const rect = originEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const colors = ['var(--confetti-1)','var(--confetti-2)','var(--confetti-3)','var(--confetti-4)'];
  for (let i = 0; i < 22; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.background = colors[i % colors.length];
    piece.style.left = cx + 'px';
    piece.style.top = cy + 'px';
    const angle = (Math.PI * 2 * i) / 22 + (Math.random()*0.5);
    const dist = 60 + Math.random() * 70;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 30;
    const rot = Math.random() * 720 - 360;
    document.body.appendChild(piece);
    piece.animate([
      { transform: 'translate(0,0) rotate(0deg) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px, ${dy}px) rotate(${rot}deg) scale(0.4)`, opacity: 0 }
    ], { duration: 700 + Math.random()*300, easing: 'cubic-bezier(.2,.8,.2,1)' }).onfinish = () => piece.remove();
  }
}

  if (!zone || !input) return;
  try {

    const allIds = getAllMovieIdsForUser(currentUser);
    if (!results.length) {

      return;

      const added = allIds.has(m.id);
      const poster = m.poster_path ? TMDB_IMG + m.poster_path : "";

function addToRanked(movie) {
  if (!currentUser) return;
  const list = myRanked();
  if (list.some(m => m.id === movie.id)) { showToast("Déjà dans ton classement"); return; }
  const updated = [...list, simplifyMovie(movie)];
  saveRankingToCloud(currentUser, updated).catch(() => showToast("Erreur d'enregistrement"));
  if (viewingUser === currentUser) renderRanked();
  showToast(`${movie.title} ajouté en position ${updated.length}`);
}

function openRatingSheet(movie, origin = null) {
  pendingRatingMovie = movie;
  pendingRatingOrigin = origin;
  const poster = movie.poster_path ? TMDB_IMG + movie.poster_path : "";
  document.getElementById("rating-preview").innerHTML = `
    ${poster ? `<img src="${poster}" alt="">` : ""}
    <div>
      <div class="context-preview-title">${escapeHtml(movie.title)}</div>
      <div class="rating-subtitle">Ta note sur 10</div>
    </div>
  `;
  document.getElementById("rating-options").innerHTML = Array.from({ length: 10 }, (_, i) => {
    const rating = i + 1;
    return `<button class="rating-choice" data-rating="${rating}" type="button">${rating}</button>`;
  }).join("");
  document.getElementById("rating-overlay").classList.add("show");
  document.querySelectorAll(".rating-choice").forEach(btn => {
    btn.addEventListener("click", () => {
      addToWatched(pendingRatingMovie, parseInt(btn.dataset.rating));
      if (pendingRatingOrigin === "watchlist") removeFromWatchlist(pendingRatingMovie.id);
      closeRatingSheet();
    });
  });
}

function closeRatingSheet() {
  document.getElementById("rating-overlay").classList.remove("show");
  pendingRatingMovie = null;
  pendingRatingOrigin = null;
}

function addToWatched(movie, rating) {
  if (!currentUser || !movie) return;
  const list = myWatched();
  const watchedMovie = { ...simplifyMovie(movie), watchedAt: Date.now(), rating };
  const existingIndex = list.findIndex(m => m.id === movie.id);
  const updated = existingIndex >= 0 ? [...list] : [watchedMovie, ...list];
  if (existingIndex >= 0) updated[existingIndex] = { ...updated[existingIndex], ...watchedMovie };
  saveWatchedToCloud(currentUser, updated).catch(() => showToast("Erreur d'enregistrement"));
  renderWatchedList();
  showToast(`${movie.title} noté ${rating}/10`);
}

function removeFromWatched(movieId) {
  const updated = myWatched().filter(m => m.id !== movieId);
  saveWatchedToCloud(currentUser, updated).catch(() => showToast("Erreur d'enregistrement"));
  renderWatchedList();
}

function addToWatchlist(movie) {
  if (!currentUser || !movie) return;
  const list = myWatchlist();
  if (list.some(m => m.id === movie.id)) { showToast("Déjà dans À voir"); return; }
  const updated = [{ ...simplifyMovie(movie), savedAt: Date.now() }, ...list];
  saveWatchlistToCloud(currentUser, updated).catch(() => showToast("Erreur d'enregistrement"));
  renderWatchlist();
  showToast(`${movie.title} ajouté à À voir`);
}

function removeFromWatchlist(movieId) {
  const updated = myWatchlist().filter(m => m.id !== movieId);
  saveWatchlistToCloud(currentUser, updated).catch(() => showToast("Erreur d'enregistrement"));
  renderWatchlist();
}

function removeFromTop(movieId) {
  const updated = myRanked().filter(m => m.id !== movieId);
  saveRankingToCloud(currentUser, updated).catch(() => showToast("Erreur d'enregistrement"));
  renderRanked();
  showToast("Retiré du Top");
}

  pendingActionMovie = movie;
  pendingActionOrigin = origin;
  pendingActionIndex = index;
  const poster = movie.poster_path ? TMDB_IMG + movie.poster_path : "";
  const inTop = myRanked().some(m => m.id === movie.id);
  const inWatched = myWatched().some(m => m.id === movie.id);
  const inWatchlist = myWatchlist().some(m => m.id === movie.id);

  document.getElementById("movie-action-preview").innerHTML = `
    ${poster ? `<img src="${poster}" alt="">` : ""}
    <div>
      <div class="context-preview-title">${escapeHtml(movie.title)}</div>
      <div class="rating-subtitle">${movie.release_date ? escapeHtml(movie.release_date.slice(0,4)) : "Film"}</div>
    </div>
  `;

  document.getElementById("movie-action-items").innerHTML = `
    <div class="context-item movie-action-item" data-action="top"><span class="ic">🏆</span> ${inTop ? "Déjà dans ton Top" : "Ajouter au Top"}</div>
    <div class="context-item movie-action-item" data-action="watched"><span class="ic">🎟️</span> ${inWatched ? "Modifier la note" : "Marquer comme vu"}</div>
    <div class="context-item movie-action-item" data-action="watchlist"><span class="ic">🍿</span> ${inWatchlist ? "Déjà dans À voir" : "Ajouter à À voir"}</div>

    ${origin === "watched" ? `<div class="context-divider"></div><div class="context-item movie-action-item danger" data-action="remove-watched"><span class="ic">🗑️</span> Retirer des vus</div>` : ""}
    ${origin === "watchlist" ? `<div class="context-divider"></div><div class="context-item movie-action-item danger" data-action="remove-watchlist"><span class="ic">🗑️</span> Retirer de À voir</div>` : ""}
  `;

  document.getElementById("movie-action-overlay").classList.add("show");
  document.querySelectorAll(".movie-action-item").forEach(item => {
    item.addEventListener("click", () => handleMovieAction(item.dataset.action));
  });
}

function closeMovieActionSheet() {
  document.getElementById("movie-action-overlay").classList.remove("show");
  pendingActionMovie = null;
  pendingActionOrigin = null;
  pendingActionIndex = null;
}

function handleMovieAction(action) {
  const movie = pendingActionMovie;
  if (!movie) return;
  if (action === "top") {
    addToRanked(movie);
    closeMovieActionSheet();
  } else if (action === "watched") {
    const origin = pendingActionOrigin === "watchlist" ? "watchlist" : null;
    closeMovieActionSheet();
    openRatingSheet(movie, origin);
  } else if (action === "watchlist") {
    addToWatchlist(movie);
    closeMovieActionSheet();
  } else if (action === "recommend") {
    closeMovieActionSheet();
    openRecommendSheet(movie);
  } else if (action === "remove-top") {
    removeFromTop(movie.id);
    closeMovieActionSheet();
  } else if (action === "remove-watched") {
    removeFromWatched(movie.id);
    closeMovieActionSheet();
  } else if (action === "remove-watchlist") {
    removeFromWatchlist(movie.id);
    closeMovieActionSheet();
  }
}

      </div>
      <div class="rating-badge">${rating}</div>

      if (action === "rate") openRatingSheet(JSON.parse(btn.dataset.movie));

function renderWatchlist() {

function attachRankInteractions() {
  const rows = document.querySelectorAll(".rank-card");

  rows.forEach(row => {
    row.addEventListener("dragstart", () => {
      draggedIndex = parseInt(row.dataset.index);
      suppressNextRankClick = true;
      row.classList.add("dragging");
    });
    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      rows.forEach(r => r.classList.remove("drop-line-top","drop-line-bottom"));
      setTimeout(() => { suppressNextRankClick = false; }, 120);
    });
    row.addEventListener("dragover", (e) => {
      e.preventDefault();
      const targetIndex = parseInt(row.dataset.index);
      if (draggedIndex === null || targetIndex === draggedIndex) return;
      const rect = row.getBoundingClientRect();
      const mid = rect.top + rect.height/2;
      row.classList.remove("drop-line-top","drop-line-bottom");
      row.classList.add(e.clientY < mid ? "drop-line-top" : "drop-line-bottom");
    });
    row.addEventListener("dragleave", () => row.classList.remove("drop-line-top","drop-line-bottom"));
    row.addEventListener("drop", (e) => {
      e.preventDefault();
      const targetIndex = parseInt(row.dataset.index);
      const insertAfter = row.classList.contains("drop-line-bottom");
      row.classList.remove("drop-line-top","drop-line-bottom");
      if (draggedIndex === null || targetIndex === draggedIndex) return;
      moveMovie(draggedIndex, targetIndex, insertAfter);
      draggedIndex = null;
    });

    let pressTimer = null;
    let startX = 0;
    let startY = 0;
    let lastTouch = null;

    const clearPressTimer = () => {
      clearTimeout(pressTimer);
      pressTimer = null;
      row.classList.remove("pressed");
    };

    row.addEventListener("touchstart", (e) => {
      if (e.touches.length !== 1 || touchDragState) return;
      const touch = e.touches[0];
      startX = touch.clientX;
      startY = touch.clientY;
      lastTouch = { clientX: touch.clientX, clientY: touch.clientY };
      row.classList.add("pressed");
      pressTimer = setTimeout(() => {
        startTouchRankDrag(row, lastTouch);
        pressTimer = null;
      }, 320);
    }, { passive: true });

    row.addEventListener("touchmove", (e) => {
      const touch = e.touches[0];
      if (!touch) return;
      lastTouch = { clientX: touch.clientX, clientY: touch.clientY };

      if (touchDragState) {
        e.preventDefault();
        updateTouchRankDrag(lastTouch);
        return;
      }

      const dx = Math.abs(touch.clientX - startX);
      const dy = Math.abs(touch.clientY - startY);
      if (pressTimer && (dx > 8 || dy > 8)) clearPressTimer();
    }, { passive: false });

    row.addEventListener("touchend", (e) => {
      if (touchDragState) {
        e.preventDefault();
        finishTouchRankDrag();
      }
      clearPressTimer();
    });

    row.addEventListener("touchcancel", () => {
      cancelTouchRankDrag();
      clearPressTimer();
    });

    row.addEventListener("click", (e) => {
      if (suppressNextRankClick || touchDragState) return;
      const index = parseInt(row.dataset.index);
      const movie = myRanked()[index];
      if (movie) openMovieActionSheet(movie, "top", index);
    });
  });
}

function clearTouchDropMarkers() {
  document.querySelectorAll(".rank-card").forEach(r => r.classList.remove("drop-line-top","drop-line-bottom"));
}

function startTouchRankDrag(row, touch) {
  if (!touch || touchDragState) return;
  const rect = row.getBoundingClientRect();
  const ghost = row.cloneNode(true);
  ghost.classList.add("touch-drag-ghost");
  ghost.style.left = rect.left + "px";
  ghost.style.top = rect.top + "px";
  ghost.style.width = rect.width + "px";
  ghost.style.height = rect.height + "px";
  ghost.style.pointerEvents = "none";
  ghost.removeAttribute("id");

  document.body.appendChild(ghost);
  document.body.classList.add("rank-touch-dragging");
  row.classList.remove("pressed");
  row.classList.add("touch-drag-source");

  touchDragState = {
    sourceIndex: parseInt(row.dataset.index),
    targetIndex: null,
    insertAfter: false,
    sourceRow: row,
    ghost,
    offsetY: touch.clientY - rect.top,
    latestY: touch.clientY,
    autoScrollSpeed: 0,
    autoScrollFrame: null
  };

  if (navigator.vibrate) navigator.vibrate(8);
  updateTouchRankDrag(touch);
}

function updateTouchRankDrag(touch) {
  if (!touchDragState) return;
  touchDragState.latestY = touch.clientY;
  touchDragState.ghost.style.top = (touch.clientY - touchDragState.offsetY) + "px";
  updateTouchDropTarget(touch.clientY);
  updateTouchAutoScroll(touch.clientY);
}

function updateTouchDropTarget(y) {
  if (!touchDragState) return;
  clearTouchDropMarkers();
  const rows = [...document.querySelectorAll(".rank-card:not(.touch-drag-source):not(.touch-drag-ghost)")];
  if (!rows.length) {
    touchDragState.targetIndex = null;
    touchDragState.insertAfter = false;
    return;
  }

  let target = rows.find(row => {
    const rect = row.getBoundingClientRect();
    return y >= rect.top && y <= rect.bottom;
  });

  if (!target) {
    const sourceRect = touchDragState.sourceRow.getBoundingClientRect();
    if (y >= sourceRect.top && y <= sourceRect.bottom) {
      touchDragState.targetIndex = null;
      touchDragState.insertAfter = false;
      return;
    }
    target = rows.reduce((closest, row) => {
      const rect = row.getBoundingClientRect();
      const distance = Math.abs(y - (rect.top + rect.height / 2));
      return !closest || distance < closest.distance ? { row, distance } : closest;
    }, null).row;
  }

  const rect = target.getBoundingClientRect();
  const insertAfter = y > rect.top + rect.height / 2;
  touchDragState.targetIndex = parseInt(target.dataset.index);
  touchDragState.insertAfter = insertAfter;
  target.classList.add(insertAfter ? "drop-line-bottom" : "drop-line-top");
}

function updateTouchAutoScroll(y) {
  if (!touchDragState) return;
  const edge = 78;
  const maxSpeed = 13;
  let speed = 0;
  if (y < edge) {
    speed = -Math.ceil(((edge - y) / edge) * maxSpeed);
  } else if (y > window.innerHeight - edge) {
    speed = Math.ceil(((y - (window.innerHeight - edge)) / edge) * maxSpeed);
  }

  touchDragState.autoScrollSpeed = speed;
  if (speed !== 0 && !touchDragState.autoScrollFrame) {
    touchDragState.autoScrollFrame = requestAnimationFrame(runTouchAutoScroll);
  }
}

function runTouchAutoScroll() {
  if (!touchDragState) return;
  if (touchDragState.autoScrollSpeed !== 0) {
    window.scrollBy(0, touchDragState.autoScrollSpeed);
    updateTouchDropTarget(touchDragState.latestY);
    touchDragState.autoScrollFrame = requestAnimationFrame(runTouchAutoScroll);
  } else {
    touchDragState.autoScrollFrame = null;
  }
}

function finishTouchRankDrag() {
  if (!touchDragState) return;
  const { sourceIndex, targetIndex, insertAfter, sourceRow, ghost, autoScrollFrame } = touchDragState;
  if (autoScrollFrame) cancelAnimationFrame(autoScrollFrame);
  clearTouchDropMarkers();
  sourceRow.classList.remove("touch-drag-source");
  ghost.remove();
  document.body.classList.remove("rank-touch-dragging");
  touchDragState = null;

  if (targetIndex === null || targetIndex === sourceIndex) return;
  suppressNextRankClick = true;
  setTimeout(() => { suppressNextRankClick = false; }, 250);
  moveMovie(sourceIndex, targetIndex, insertAfter);
}

function cancelTouchRankDrag() {
  if (!touchDragState) return;
  const { sourceRow, ghost, autoScrollFrame } = touchDragState;
  if (autoScrollFrame) cancelAnimationFrame(autoScrollFrame);
  clearTouchDropMarkers();
  sourceRow.classList.remove("touch-drag-source");
  ghost.remove();
  document.body.classList.remove("rank-touch-dragging");
  touchDragState = null;
  suppressNextRankClick = true;
  setTimeout(() => { suppressNextRankClick = false; }, 250);
}

function moveMovie(fromIdx, toIdx, insertAfter) {
  const list = [...myRanked()];
  if (fromIdx < 0 || fromIdx >= list.length || toIdx < 0 || toIdx >= list.length) return;
  const [movie] = list.splice(fromIdx, 1);
  let newIndex = toIdx;
  if (fromIdx < toIdx) newIndex--;
  if (insertAfter) newIndex++;
  newIndex = Math.max(0, Math.min(newIndex, list.length));
  list.splice(newIndex, 0, movie);
  saveRankingToCloud(currentUser, list).catch(() => showToast("Erreur d'enregistrement"));
  renderRanked();
  if (newIndex === 0) {
    setTimeout(() => {
      const firstCard = document.querySelector('.rank-card[data-pos="1"] .rank-badge');
      if (firstCard) fireConfetti(firstCard);
    }, 80);
  }
}

function setupPwaInstallMetadata() {
  const links = [
    { rel: "apple-touch-icon", href: "./apple-touch-icon.png" },
    { rel: "icon", href: "./favicon.png", type: "image/png", sizes: "64x64" },
    { rel: "manifest", href: "./site.webmanifest" }
  ];
  links.forEach(linkData => {
    let link = document.querySelector(`link[rel="${linkData.rel}"]`);
    if (!link) {
      link = document.createElement("link");
      link.rel = linkData.rel;
      document.head.appendChild(link);
    }
    Object.entries(linkData).forEach(([key, value]) => link.setAttribute(key, value));
  });
}
function isStandaloneApp() {
  return window.navigator.standalone === true || window.matchMedia("(display-mode: standalone)").matches;
}
async function setupForegroundPushListener() {
  if (foregroundPushListening || !isPushConfigured() || !canUsePushHere()) return;
  try {
    if (!(await isMessagingSupported())) return;
    const messaging = getMessaging(app);
    onMessage(messaging, payload => {
      const body = payload.notification?.body || payload.data?.body || "Nouvelle recommandation reçue";
      showToast(body);
      if (profilesSynced && rankingsSynced && currentUser && !onboardingNewUser) renderPage();
    });
    foregroundPushListening = true;
  } catch (e) {}
}
async function getPushRegistrationToken() {
  if (!(await isMessagingSupported())) throw new Error("unsupported");
  const registration = await navigator.serviceWorker.register("./firebase-messaging-sw.js");
  const messaging = getMessaging(app);
  return await getToken(messaging, {
    vapidKey: FCM_VAPID_KEY,
    serviceWorkerRegistration: registration
  });
}
async function savePushTokenForProfile(profileId, token) {
  if (!profileId || !token) return;
  const now = Date.now();
  await setDoc(doc(db, "pushTokens", profileId, "tokens", tokenDocId(token)), {
    token,
    profileId,
    userAgent: navigator.userAgent,
    platform: navigator.platform || "",
    updatedAt: now,
    createdAt: now
  }, { merge: true });
  localStorage.setItem(PUSH_BOUND_KEY, `${profileId}:${tokenDocId(token)}`);
}
async function syncPendingPushTokenForCurrentUser() {
  if (!currentUser || !isPushConfigured() || !canUsePushHere()) return;
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  let token = localStorage.getItem(PENDING_PUSH_TOKEN_KEY);
  try {
    if (!token) {
      token = await getPushRegistrationToken();
      if (token) localStorage.setItem(PENDING_PUSH_TOKEN_KEY, token);
    }
    if (!token) return;
    const boundKey = `${currentUser}:${tokenDocId(token)}`;
    if (localStorage.getItem(PUSH_BOUND_KEY) === boundKey) return;
    await savePushTokenForProfile(currentUser, token);
  } catch (e) {}
}
async function enablePushNotifications(options = {}) {
  const allowWithoutProfile = options.allowWithoutProfile === true;
  if (!currentUser && !allowWithoutProfile) {
    showToast("Choisis d'abord ton profil");
    return false;
  }
  if (!isPushConfigured()) {
    showToast("Ajoute d'abord la clé VAPID dans le code");
    return false;
  }
  if (!canUsePushHere()) {
    showToast("Les notifications demandent HTTPS");
    return false;
  }
  if (isIosDevice() && !isStandaloneApp()) {
    openInstallSheet();
    showToast("Sur iPhone, ouvre l'app depuis l'écran d'accueil");
    return false;
  }
  try {
    const permission = await Notification.requestPermission();
    if (permission !== "granted") {
      showToast("Notifications refusées");
      renderPage();
      return false;
    }
    const token = await getPushRegistrationToken();
    if (!token) {
      showToast("Impossible d'activer les notifs");
      return false;
    }
    localStorage.setItem(PENDING_PUSH_TOKEN_KEY, token);
    if (currentUser) await savePushTokenForProfile(currentUser, token);
    await setupForegroundPushListener();
    showToast("Notifications activées 🔔");
    renderPage();
    return true;
  } catch (e) {
    showToast(e.message === "unsupported" ? "Notifications non compatibles ici" : "Erreur notifications");
    return false;
  }
}

    ${poster ? `<img src="${poster}" alt="">` : ""}
    <div class="context-preview-title">${escapeHtml(movie.title)}</div>
  `;
  document.getElementById("context-overlay").classList.add("show");
}
function closeContextMenu() {
  document.getElementById("context-overlay").classList.remove("show");
  activeContextIndex = null;
}

async function ensureGenreData() {
  if (!currentUser) return;
  const list = myRanked();
  const missing = list.filter(m => !m.genre_ids || !m.genre_ids.length);
  if (!missing.length) return;
  await Promise.all(missing.map(async (m) => {
    try {
      const details = await getMovieDetails(m.id);
      m.genre_ids = (details.genres || []).map(g => g.id);
    } catch(e) { m.genre_ids = []; }
  }));
  await saveRankingToCloud(currentUser, list).catch(() => showToast("Erreur d'enregistrement"));
}

function computeGenreWeights(list) {
  const weights = {};
  const n = list.length;
  list.forEach((m, i) => {
    const positionWeight = n - i;
    (m.genre_ids || []).forEach(gid => { weights[gid] = (weights[gid] || 0) + positionWeight; });
  });
  return weights;
}

function scoreCandidate(candidate, genreWeights) {
  const genres = candidate.genre_ids || [];
  if (!genres.length) return 0;
  let score = 0;
  genres.forEach(gid => { score += (genreWeights[gid] || 0); });
  score = score / genres.length;
  score += (candidate.vote_average || 0) * 2;
  return score;
}

async function updateRecommendations() {
  const scroll = document.getElementById("reco-scroll");
  if (!scroll) return;
  const requestId = ++recommendationRequestSeq;
  const userId = currentUser;
  const list = myRanked();

  if (list.length === 0) {
    scroll.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--ink-soft);font-weight:600">Classe des films pour avoir des recommandations</div>`;
    return;
  }

  scroll.innerHTML = `<div style="padding:20px"><span class="loading-spin"></span></div>`;

  try {
    await ensureGenreData();
    if (requestId !== recommendationRequestSeq || userId !== currentUser || !document.body.contains(scroll)) return;
    const freshList = myRanked();
    const genreWeights = computeGenreWeights(freshList);

    const top3 = freshList.slice(0, 3);
    const next3 = freshList.slice(3, 6);
    const sourcePool = [...top3, ...top3, ...next3];
    const sample = [...sourcePool].sort(() => Math.random() - 0.5).slice(0, 5);
    const uniqueSample = [...new Map(sample.map(m => [m.id, m])).values()];

    const allIds = getAllMovieIdsForUser(currentUser);
    const results = await Promise.all(
      uniqueSample.map(async (m) => {
        const recos = await getRecommendations(m.id);
        return recos.map(r => ({ ...r, because: m.title }));
      })
    );
    if (requestId !== recommendationRequestSeq || userId !== currentUser || !document.body.contains(scroll)) return;

    const seen = new Set(); const merged = [];
    results.flat().forEach(r => {
      if (!seen.has(r.id) && !allIds.has(r.id)) { seen.add(r.id); merged.push(r); }
    });

    merged.forEach(m => { m._score = scoreCandidate(m, genreWeights); });
    const scoredSorted = merged.filter(m => m._score > 0).sort((a,b) => b._score - a._score);
    const fallback = merged.filter(m => m._score === 0).sort((a,b) => (b.vote_average||0) - (a.vote_average||0));
    const final = [...scoredSorted, ...fallback].slice(0, 10);

    if (!final.length) {
      scroll.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--ink-soft);font-weight:600">Classe plus de films pour avoir des recos</div>`;
      return;
    }

    scroll.innerHTML = final.map(m => {
      const poster = m.poster_path ? TMDB_IMG + m.poster_path : "";
      const title = escapeHtml(m.title);
      const year = m.release_date ? escapeHtml(m.release_date.slice(0,4)) : "?";
      const rating = m.vote_average ? Number(m.vote_average).toFixed(1) : "—";
      return `
      <div class="reco-item">
        ${poster ? `<img src="${poster}" alt="${escapeAttr(m.title)}">` : `<div style="aspect-ratio:2/3;background:#eee"></div>`}
        <div class="reco-item-body">
          <div class="reco-item-title">${title}</div>
          <div class="reco-item-meta">${year} · ⭐${rating}</div>
          <button class="reco-add-btn" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(m)))}'>Choisir</button>
        </div>
      </div>`;
    }).join("");

    scroll.querySelectorAll(".reco-add-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        openMovieActionSheet(JSON.parse(btn.dataset.movie), "recommendation");
      });
    });
  } catch (e) {
    if (requestId !== recommendationRequestSeq || userId !== currentUser || !document.body.contains(scroll)) return;
    scroll.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--ink-soft);font-weight:600">Erreur de chargement</div>`;
  }
}

function renderRecentFeed() {
  const el = document.getElementById("recent-list");
  if (!el) return;

  const entries = [];
  Object.entries(allWatched).forEach(([userId, list]) => {
    const profile = PROFILES.find(p => p.id === userId);
    if (!profile) return;
    list.forEach(m => {
      const rating = Number.isFinite(Number(m.rating)) ? `${Number(m.rating)}/10` : "vu";
      entries.push({
        movie: m,
        userId,
        profile,
        label: rating,
        addedAt: m.watchedAt || m.addedAt || 0
      });
    });
  });
  Object.entries(allRankings).forEach(([userId, list]) => {
    const profile = PROFILES.find(p => p.id === userId);
    if (!profile) return;
    list.forEach((m, i) => {
      entries.push({ movie: m, userId, profile, label: `#${i + 1}`, addedAt: m.addedAt || 0 });
    });
  });

  const byMovie = {};
  entries.forEach(e => {
    if (!byMovie[e.movie.id]) byMovie[e.movie.id] = { movie: e.movie, raters: [], latestAddedAt: 0 };
    const existing = byMovie[e.movie.id].raters.find(r => r.profile.id === e.profile.id && r.label === e.label);
    if (!existing) byMovie[e.movie.id].raters.push({ profile: e.profile, label: e.label });
    byMovie[e.movie.id].latestAddedAt = Math.max(byMovie[e.movie.id].latestAddedAt, e.addedAt);
  });

  const grouped = Object.values(byMovie).sort((a,b) => b.latestAddedAt - a.latestAddedAt).slice(0, 20);

  if (!grouped.length) {
    el.innerHTML = `<div class="empty-state" style="margin:0">Personne n'a encore vu ou classé de film</div>`;
    return;
  }

  el.innerHTML = grouped.map(g => {
    const poster = g.movie.poster_path ? TMDB_IMG + g.movie.poster_path : "";
    return `
    <div class="recent-row" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(g.movie)))}'>
      ${poster ? `<img class="recent-poster" src="${poster}" alt="${escapeAttr(g.movie.title)}">` : `<div class="recent-poster" style="background:#E8E4F5"></div>`}
      <div class="recent-info">
        <div class="recent-title">${escapeHtml(g.movie.title)}</div>
        <div class="recent-raters">
          ${g.raters.map(r => `
            <span class="rater-chip" style="--pc:${escapeAttr(r.profile.color)}">
              <span class="rater-initial">${escapeHtml(r.profile.initial)}</span>
              ${escapeHtml(r.label)}
            </span>
          `).join("")}
        </div>
      </div>
    </div>`;
  }).join("");

  el.querySelectorAll(".recent-row").forEach(row => {
    row.addEventListener("click", () => {
      openMovieActionSheet(JSON.parse(row.dataset.movie), "recent");
    });
  });
}

document.addEventListener("DOMContentLoaded", () => {
  applyPlatformMode();
  setupPwaInstallMetadata();
  setupForegroundPushListener();
  renderInstallSheetContent();

  const scrollLockObserver = new MutationObserver(scheduleScrollLockUpdate);
  scrollLockObserver.observe(document.body, {
    childList: true,
    subtree: true,
    attributes: true,
    attributeFilter: ["class", "style"]
  });
  window.addEventListener("resize", scheduleScrollLockUpdate);
  window.addEventListener("orientationchange", scheduleScrollLockUpdate);
  document.addEventListener("touchmove", (e) => {
    if (!document.body.classList.contains("no-page-scroll")) return;
    if (touchDragState || canTouchScrollInside(e.target)) return;
    e.preventDefault();
  }, { passive: false });

  renderPage();

  setTimeout(() => {
    if (!profilesSynced || (currentUser && !rankingsSynced)) {
      profilesSynced = true;
      rankingsSynced = true;
      renderPage();
    }
  }, 3500);

  document.getElementById("context-overlay").addEventListener("click", (e) => {
    if (e.target.id === "context-overlay") closeContextMenu();
  });
  document.getElementById("recommend-overlay").addEventListener("click", (e) => {
    if (e.target.id === "recommend-overlay") closeRecommendSheet();
  });
  document.getElementById("movie-action-overlay").addEventListener("click", (e) => {
    if (e.target.id === "movie-action-overlay") closeMovieActionSheet();
  });
  document.getElementById("install-overlay").addEventListener("click", (e) => {
    if (e.target.id === "install-overlay") closeInstallSheet();
  });
  document.getElementById("btn-close-install").addEventListener("click", closeInstallSheet);
  document.getElementById("settings-overlay").addEventListener("click", (e) => {
    if (e.target.id === "settings-overlay") closeSettingsSheet();
  });
  document.getElementById("btn-close-settings").addEventListener("click", closeSettingsSheet);
  document.getElementById("rating-overlay").addEventListener("click", (e) => {
    if (e.target.id === "rating-overlay") closeRatingSheet();
  });
  document.getElementById("btn-cancel-rating").addEventListener("click", closeRatingSheet);
  document.querySelectorAll(".context-item").forEach(item => {
    item.addEventListener("click", () => {
      if (activeContextIndex === null) return;
      const action = item.dataset.action;
      const i = activeContextIndex;
      const list = [...myRanked()];
      if (i < 0 || i >= list.length) {
        closeContextMenu();
        return;
      }

      if (action === "top" && i !== 0) {
        const [movie] = list.splice(i, 1);
        list.unshift(movie);
        saveRankingToCloud(currentUser, list).catch(() => showToast("Erreur d'enregistrement"));
        renderRanked();
        setTimeout(() => {
          const firstBadge = document.querySelector('.rank-card[data-pos="1"] .rank-badge');
          if (firstBadge) fireConfetti(firstBadge);
        }, 80);
        showToast(`${movie.title} en N°1 🏆`);
      } else if (action === "up" && i > 0) {
        [list[i-1], list[i]] = [list[i], list[i-1]];
        saveRankingToCloud(currentUser, list).catch(() => showToast("Erreur d'enregistrement"));
        renderRanked();
      } else if (action === "down" && i < list.length - 1) {
        [list[i+1], list[i]] = [list[i], list[i+1]];
        saveRankingToCloud(currentUser, list).catch(() => showToast("Erreur d'enregistrement"));
        renderRanked();
      } else if (action === "remove") {
        const [movie] = list.splice(i, 1);
        saveRankingToCloud(currentUser, list).catch(() => showToast("Erreur d'enregistrement"));
        renderRanked();
        showToast(`${movie.title} retiré`);
      }
      closeContextMenu();
    });
  });

  listenProfiles((list, metadata) => {
    PROFILES = list;
    const serverConfirmed = !metadata.fromCache && !metadata.failed;
    if (serverConfirmed) profilesServerConfirmed = true;
    const currentProfileExists = !currentUser || list.some(p => p.id === currentUser);
    const canRenderProfiles = list.length > 0 || serverConfirmed || metadata.failed;

    // On ne considère pas un snapshot vide depuis le cache comme une vérité :
    // au démarrage, il peut arriver avant la synchro serveur et ne doit pas
    // effacer la session locale ni afficher l'écran "aucun profil".
    if (!canRenderProfiles || (currentUser && !currentProfileExists && !serverConfirmed && !onboardingNewUser)) {
      renderBootLoading();
      return;
    }

    profilesSynced = true;
    if (currentUser && serverConfirmed && !list.some(p => p.id === currentUser)) {
      ensureProfileInCloud(currentUser);
    }
    if (!onboardingNewUser && serverConfirmed) normalizeActiveUsers();
    if (currentUser && !viewingUser) viewingUser = currentUser;
    renderPage();
  });
  listenProfileIndex(list => {
    PROFILE_INDEX = list;
    if (currentUser && !profileById(currentUser)) ensureProfileInCloud(currentUser);
    if (profilesSynced && rankingsSynced && currentUser && !onboardingNewUser) renderPage();
  });
  listenAllRankings(data => {
    allRankings = data;
    rankingsSynced = true;
    renderPage();
  });
  listenAllWatched(data => {
    allWatched = data;
    if (profilesSynced && rankingsSynced && currentUser && activeTab === "watched") renderWatchedList();
    if (profilesSynced && rankingsSynced && currentUser && activeTab === "search" && recentExpanded) renderRecentFeed();
  });
  listenAllWatchlist(data => {
    allWatchlist = data;
    if (profilesSynced && rankingsSynced && currentUser && activeTab === "watchlist") renderWatchlist();
  });
  listenIncomingRecos(data => {
    incomingRecos = data;
    if (profilesSynced && rankingsSynced && currentUser && !onboardingNewUser) renderPage();
  });
});
</script>

  background: rgba(246,244,252,0.78); border-radius: 18px; padding: 6px; margin: 0 4px 10px;
  box-shadow: inset 3px 3px 8px rgba(180,170,220,0.18), inset -3px -3px 8px rgba(255,255,255,0.85);
}
.settings-item {
  width: 100%; border: none; background: transparent; font-family: 'Plus Jakarta Sans', sans-serif; text-align: left;
}
.settings-item + .settings-item { margin-top: 2px; }
.settings-item span:not(.settings-icon) { display: flex; flex-direction: column; gap: 2px; min-width: 0; }

.settings-icon {
  width: 34px; height: 34px; border-radius: 12px; flex: 0 0 34px; display: grid; place-items: center;
  color: var(--lav-deep); background: var(--bg);

}

.settings-item.danger small, .settings-item.danger strong { color: #d64668; }
.rating-subtitle { font-family: 'DM Mono', monospace; color: var(--ink-soft); font-size: 11px; margin-top: 3px; }
.rating-options { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 0 6px 12px; }
.rating-choice {

.confetti-piece { position: fixed; width: 7px; height: 7px; top: 50%; left: 50%; border-radius: 2px; pointer-events: none; z-index: 600; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px) scale(0.9);
  background: var(--ink); color: white; padding: 13px 22px; border-radius: 16px; font-size: 13px; font-weight: 600;
  opacity: 0; transition: all 0.3s cubic-bezier(.34,1.56,.64,1); z-index: 2000; pointer-events: none;
  box-shadow: 0 10px 30px rgba(45,42,61,0.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

.modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(45,42,61,0.4); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--card); border-radius: 28px; padding: 30px; max-width: 420px; width: 100%; box-shadow: 10px 10px 30px var(--shadow-d), -10px -10px 30px var(--shadow-l); }
.modal-emoji { font-size: 34px; margin-bottom: 10px; }
.modal-title { font-weight: 800; font-size: 21px; margin-bottom: 10px; }
.modal-text { font-size: 13.5px; color: var(--ink-soft); line-height: 1.65; margin-bottom: 18px; font-weight: 500; }
.modal-text a { color: var(--lav-deep); font-weight: 700; }
.modal-text ol { margin: 10px 0 10px 18px; }
.modal-text li { margin-bottom: 6px; }
.modal-input { width: 100%; background: var(--bg); border: none; border-radius: 14px; padding: 14px 16px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; margin-bottom: 14px; box-shadow: inset 3px 3px 7px var(--shadow-d), inset -3px -3px 7px var(--shadow-l); }
.modal-error { color: #d64668; font-size: 12px; margin-bottom: 12px; font-weight: 600; display: none; }
.btn-primary { width: 100%; background: var(--lav); color: white; border: none; padding: 15px; border-radius: 16px; font-weight: 700; font-size: 15px; cursor: pointer; transition: transform 0.12s; font-family: 'Plus Jakarta Sans', sans-serif; }
.btn-primary:active { transform: scale(0.96); }

.loading-spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--ink-faint); border-top-color: var(--lav); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.boot-loading {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
.boot-logo {
  width: 88px; height: 88px; border-radius: 23px; object-fit: cover;
  background: rgba(255,255,255,0.76);

  box-shadow: 0 10px 28px rgba(154,147,184,0.22), 7px 7px 18px var(--shadow-d), -7px -7px 18px var(--shadow-l);

</head>
