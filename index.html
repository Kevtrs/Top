async function saveRankingToCloud(userId, rankedArray) {
  await setDoc(doc(db, "rankings", userId), { movies: rankedArray, updatedAt: Date.now() });
}
function listenAllRankings(cb) {
  return onSnapshot(collection(db, "rankings"), snap => {
    const data = {};
    snap.forEach(d => { data[d.id] = d.data().movies || []; });
    cb(data);
  });
}
function myRanked() { return allRankings[currentUser] || []; }
function viewedRanked() { return allRankings[viewingUser] || []; }

// ─── PROFILS (dynamiques, illimités) ───────────────────────────────
function slugify(name) {
  return name.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // enlève les accents
    .replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
}
async function createProfile(name) {
  const id = slugify(name) || `profil-${Date.now()}`;
  const color = PROFILE_COLORS[PROFILES.length % PROFILE_COLORS.length];
  await setDoc(doc(db, "profiles", id), {
    id, name, initial: name.trim()[0]?.toUpperCase() || "?",
    color, createdAt: Date.now()
  });
  return id;
}
function listenProfiles(cb) {
  return onSnapshot(collection(db, "profiles"), snap => {
    const list = [];
    snap.forEach(d => list.push(d.data()));
    list.sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
    cb(list);
  });
}

// ─── RECOMMANDATIONS ENTRE PROFILS ─────────────────────────────────
async function sendRecoToUser(toUserId, movie) {
  const recoId = `${toUserId}_${movie.id}_${Date.now()}`;
  await setDoc(doc(db, "sentRecos", recoId), {
    to: toUserId,
    from: currentUser,
    movie: { id: movie.id, title: movie.title, poster_path: movie.poster_path },
    seen: false,
    createdAt: Date.now()
  });
}
function listenIncomingRecos(cb) {
  return onSnapshot(collection(db, "sentRecos"), snap => {
    const all = [];
    snap.forEach(d => all.push({ docId: d.id, ...d.data() }));
    cb(all);
  });
}
async function markRecoSeen(docId) {
  await setDoc(doc(db, "sentRecos", docId), { seen: true }, { merge: true });
}
async function dismissReco(docId) {
  await deleteDoc(doc(db, "sentRecos", docId));
}

async function tmdbFetch(path, params = {}) {
  const url = new URL(`https://api.themoviedb.org/3${path}`);
  url.searchParams.set("api_key", TMDB_API_KEY);
  url.searchParams.set("language", "fr-FR");
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url);
  if (!res.ok) throw new Error("TMDB " + res.status);
  return res.json();
}
async function searchMovies(q) {
  if (!q.trim()) return [];
  const data = await tmdbFetch("/search/movie", { query: q, include_adult: "false" });
  return data.results || [];
}
async function getRecommendations(id) {
  const data = await tmdbFetch(`/movie/${id}/recommendations`);
  return data.results || [];
}
async function getMovieDetails(id) {
  return await tmdbFetch(`/movie/${id}`);
}

function escapeAttr(s) { return s.replace(/'/g, "&#39;"); }
function simplifyMovie(m) {
  return {
    id: m.id, title: m.title, poster_path: m.poster_path,
    release_date: m.release_date, vote_average: m.vote_average,
    genre_ids: m.genre_ids || [], addedAt: Date.now()
  };
}
function getAllMovieIdsForUser(userId) {
  return new Set((allRankings[userId] || []).map(m => m.id));
}
function profileAvatarHtml(profileId, size) {
  const p = PROFILES.find(pr => pr.id === profileId);
  const topMovie = (allRankings[profileId] || [])[0];
  if (topMovie?.poster_path) {
    return `<img class="avatar-poster" style="width:${size}px;height:${size}px" src="${TMDB_IMG + topMovie.poster_path}" alt="">`;
  }
  return `<span class="avatar-initial-sm" style="width:${size}px;height:${size}px;background:${p.color}">${p.initial}</span>`;
}

function renderPage() {

    renderOnboarding();
  } else if (!currentUser || creatingProfile) {
    renderProfilePicker();
  } else {
    renderApp();

}

function attachAppEvents() {
  document.getElementById("btn-reset")?.addEventListener("click", () => {
    if (confirm("Effacer tout ton classement ?")) {
      saveRankingToCloud(currentUser, []);
      showToast("Classement réinitialisé");
    }
  });

  document.querySelectorAll(".profile-chip").forEach(el => {
    el.addEventListener("click", () => {
      viewingUser = el.dataset.id;
      renderApp();
    });
  });

  document.querySelectorAll(".reco-banner-dismiss").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      dismissReco(btn.dataset.doc);
    });
  });
  document.querySelectorAll(".reco-banner").forEach(el => {
    el.addEventListener("click", () => dismissReco(el.dataset.doc));
  });

  const searchBox = document.getElementById("search-box");
  const searchInput = document.getElementById("search-input");
  if (searchInput) {
    searchInput.addEventListener("focus", () => searchBox.classList.add("focused"));
    searchInput.addEventListener("blur", () => searchBox.classList.remove("focused"));
    let searchTimeout;
    searchInput.addEventListener("input", (e) => {
      clearTimeout(searchTimeout);
      const q = e.target.value;
      if (!q.trim()) { document.getElementById("search-results-zone").innerHTML = ""; return; }
      document.getElementById("search-results-zone").innerHTML = `<div class="skeleton-grid">${Array(6).fill('<div class="skeleton-card"></div>').join("")}</div>`;
      searchTimeout = setTimeout(() => runSearch(q), 350);
    });
  }

  document.getElementById("reco-accordion-header")?.addEventListener("click", () => {
    recoExpanded = !recoExpanded;
    toggleAccordion("reco", recoExpanded);
    if (recoExpanded) updateRecommendations();
  });
  document.getElementById("recent-accordion-header")?.addEventListener("click", () => {
    const body = document.getElementById("recent-body");
    const expanded = body.style.display !== "none";
    toggleAccordion("recent", !expanded);
    if (!expanded) renderRecentFeed();
  });
}

function toggleAccordion(prefix, expand) {
  const body = document.getElementById(`${prefix}-body`);
  const chevron = document.getElementById(`${prefix}-chevron`);
  body.style.display = expand ? "block" : "none";
  chevron.style.transform = expand ? "rotate(180deg)" : "rotate(0deg)";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function fireConfetti(originEl) {
  const rect = originEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const colors = ['var(--confetti-1)','var(--confetti-2)','var(--confetti-3)','var(--confetti-4)'];
  for (let i = 0; i < 22; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.background = colors[i % colors.length];
    piece.style.left = cx + 'px';
    piece.style.top = cy + 'px';
    const angle = (Math.PI * 2 * i) / 22 + (Math.random()*0.5);
    const dist = 60 + Math.random() * 70;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 30;
    const rot = Math.random() * 720 - 360;
    document.body.appendChild(piece);
    piece.animate([
      { transform: 'translate(0,0) rotate(0deg) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px, ${dy}px) rotate(${rot}deg) scale(0.4)`, opacity: 0 }
    ], { duration: 700 + Math.random()*300, easing: 'cubic-bezier(.2,.8,.2,1)' }).onfinish = () => piece.remove();
  }
}

async function runSearch(query) {
  const zone = document.getElementById("search-results-zone");
  try {
    const results = await searchMovies(query);
    const allIds = getAllMovieIdsForUser(currentUser);
    if (!results.length) {
      zone.innerHTML = `<div style="padding:20px;text-align:center;color:var(--ink-faint);font-size:13px;font-weight:600">Aucun résultat</div>`;
      return;
    }
    zone.innerHTML = `<div class="search-results">${results.slice(0,9).map(m => {
      const added = allIds.has(m.id);
      const poster = m.poster_path ? TMDB_IMG + m.poster_path : "";
      return `
      <div class="poster-pick ${added ? "added" : ""}" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(m)))}'>
        ${poster ? `<img src="${poster}" alt="${m.title}">` : `<div style="aspect-ratio:2/3;background:#E8E4F5;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink-faint);padding:6px;text-align:center">Pas d'affiche</div>`}
        <div class="poster-pick-title">${m.title}${m.release_date ? ` (${m.release_date.slice(0,4)})` : ""}</div>
        <div class="poster-pick-recommend" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(m)))}'>👋 Recommander</div>
      </div>`;
    }).join("")}</div>`;

    zone.querySelectorAll(".poster-pick-recommend").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        openRecommendSheet(JSON.parse(btn.dataset.movie));
      });
    });

    zone.querySelectorAll(".poster-pick:not(.added)").forEach(card => {
      card.addEventListener("click", () => {
        const movie = JSON.parse(card.dataset.movie);
        addToRanked(movie);
        document.getElementById("search-input").value = "";
        zone.innerHTML = "";
        document.getElementById("search-input").blur();
      });
    });
  } catch (e) {
    zone.innerHTML = `<div style="padding:20px;text-align:center;color:var(--ink-faint);font-size:13px;font-weight:600">Erreur — vérifie ta clé API</div>`;
  }
}

function addToRanked(movie) {
  const list = myRanked();
  if (list.some(m => m.id === movie.id)) { showToast("Déjà dans ton classement"); return; }
  const updated = [...list, movie];
  saveRankingToCloud(currentUser, updated);
  showToast(`${movie.title} ajouté en position ${updated.length}`);
}

  const list = viewedRanked();

  if (!list.length) {
    el.innerHTML = `<div class="empty-state">${isOwnProfile ? "Cherche un film ci-dessus pour commencer ton classement 🎬" : "Ce profil n'a pas encore classé de film"}</div>`;
    return;
  }
  el.innerHTML = list.map((m, i) => {
    const poster = m.poster_path ? TMDB_IMG + m.poster_path : "";
    return `
    <div class="rank-card" draggable="${isOwnProfile}" data-index="${i}" data-pos="${i+1}">
      <div class="rank-badge">${i+1}</div>
      ${poster ? `<img class="rank-poster" src="${poster}" alt="${m.title}">` : `<div class="rank-poster" style="background:#E8E4F5;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--ink-faint);text-align:center;padding:4px">${m.title}</div>`}
      <div class="rank-info">
        <div class="rank-title">${m.title}</div>
        <div class="rank-meta">${m.release_date ? m.release_date.slice(0,4) : "????"} · ⭐ ${m.vote_average ? m.vote_average.toFixed(1) : "—"}</div>
      </div>
      ${!isOwnProfile ? `<button class="rank-recommend-btn" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(m)))}'>👋</button>` : ""}
    </div>`;
  }).join("");

  if (isOwnProfile) {
    attachRankInteractions();
  } else {
    el.querySelectorAll(".rank-recommend-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        openRecommendSheet(JSON.parse(btn.dataset.movie));
      });
    });
  }
}

function attachRankInteractions() {
  const rows = document.querySelectorAll(".rank-card");

  rows.forEach(row => {
    row.addEventListener("dragstart", () => {
      draggedIndex = parseInt(row.dataset.index);
      row.classList.add("dragging");
    });
    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      rows.forEach(r => r.classList.remove("drop-line-top","drop-line-bottom"));
    });
    row.addEventListener("dragover", (e) => {
      e.preventDefault();
      const targetIndex = parseInt(row.dataset.index);
      if (draggedIndex === null || targetIndex === draggedIndex) return;
      const rect = row.getBoundingClientRect();
      const mid = rect.top + rect.height/2;
      row.classList.remove("drop-line-top","drop-line-bottom");
      row.classList.add(e.clientY < mid ? "drop-line-top" : "drop-line-bottom");
    });
    row.addEventListener("dragleave", () => row.classList.remove("drop-line-top","drop-line-bottom"));
    row.addEventListener("drop", (e) => {
      e.preventDefault();
      const targetIndex = parseInt(row.dataset.index);
      const insertAfter = row.classList.contains("drop-line-bottom");
      row.classList.remove("drop-line-top","drop-line-bottom");
      if (draggedIndex === null || targetIndex === draggedIndex) return;
      moveMovie(draggedIndex, targetIndex, insertAfter);
      draggedIndex = null;
    });

    let pressTimer = null;
    let touchMoved = false;
    row.addEventListener("touchstart", () => {
      touchMoved = false;
      row.classList.add("pressed");
      pressTimer = setTimeout(() => {
        if (!touchMoved) {
          if (navigator.vibrate) navigator.vibrate(8);
          openContextMenu(parseInt(row.dataset.index));
        }
        row.classList.remove("pressed");
      }, 420);
    }, { passive: true });
    row.addEventListener("touchmove", () => {
      touchMoved = true;
      clearTimeout(pressTimer);
      row.classList.remove("pressed");
    }, { passive: true });
    row.addEventListener("touchend", () => {
      clearTimeout(pressTimer);
      row.classList.remove("pressed");
    });

    let mouseDownTimer = null;
    row.addEventListener("mousedown", () => {
      mouseDownTimer = setTimeout(() => openContextMenu(parseInt(row.dataset.index)), 500);
    });
    row.addEventListener("mouseup", () => clearTimeout(mouseDownTimer));
    row.addEventListener("mouseleave", () => clearTimeout(mouseDownTimer));
  });
}

function moveMovie(fromIdx, toIdx, insertAfter) {
  const list = [...myRanked()];
  const [movie] = list.splice(fromIdx, 1);
  let newIndex = toIdx;
  if (fromIdx < toIdx) newIndex--;
  if (insertAfter) newIndex++;
  list.splice(newIndex, 0, movie);
  saveRankingToCloud(currentUser, list);
  if (newIndex === 0) {
    setTimeout(() => {
      const firstCard = document.querySelector('.rank-card[data-pos="1"] .rank-badge');
      if (firstCard) fireConfetti(firstCard);
    }, 80);
  }
}

function openRecommendSheet(movie) {
  const others = PROFILES.filter(p => p.id !== currentUser);
  const poster = movie.poster_path ? TMDB_IMG + movie.poster_path : "";
  document.getElementById("recommend-preview").innerHTML = `
    ${poster ? `<img src="${poster}">` : ""}
    <div class="context-preview-title">${movie.title}</div>
  `;
  document.getElementById("recommend-targets").innerHTML = others.map(p => `
    <div class="context-item recommend-target" data-id="${p.id}">
      ${profileAvatarHtml(p.id, 28)}
      <span>Envoyer à ${p.name}</span>
    </div>
  `).join("");
  document.getElementById("recommend-overlay").classList.add("show");

  document.querySelectorAll(".recommend-target").forEach(item => {
    item.onclick = async () => {
      await sendRecoToUser(item.dataset.id, movie);
      const targetProfile = PROFILES.find(p => p.id === item.dataset.id);
      showToast(`Envoyé à ${targetProfile.name} 👋`);
      closeRecommendSheet();
    };
  });
}
function closeRecommendSheet() {
  document.getElementById("recommend-overlay").classList.remove("show");
}

function openContextMenu(index) {
  activeContextIndex = index;
  const movie = myRanked()[index];
  const poster = movie.poster_path ? TMDB_IMG + movie.poster_path : "";
  document.getElementById("context-preview").innerHTML = `
    ${poster ? `<img src="${poster}">` : ""}
    <div class="context-preview-title">${movie.title}</div>
  `;
  document.getElementById("context-overlay").classList.add("show");
}
function closeContextMenu() {
  document.getElementById("context-overlay").classList.remove("show");
  activeContextIndex = null;
}

async function ensureGenreData() {
  const list = myRanked();
  const missing = list.filter(m => !m.genre_ids || !m.genre_ids.length);
  if (!missing.length) return;
  await Promise.all(missing.map(async (m) => {
    try {
      const details = await getMovieDetails(m.id);
      m.genre_ids = (details.genres || []).map(g => g.id);
    } catch(e) { m.genre_ids = []; }
  }));
  await saveRankingToCloud(currentUser, list);
}

function computeGenreWeights(list) {
  const weights = {};
  const n = list.length;
  list.forEach((m, i) => {
    const positionWeight = n - i;
    (m.genre_ids || []).forEach(gid => { weights[gid] = (weights[gid] || 0) + positionWeight; });
  });
  return weights;
}

function scoreCandidate(candidate, genreWeights) {
  const genres = candidate.genre_ids || [];
  if (!genres.length) return 0;
  let score = 0;
  genres.forEach(gid => { score += (genreWeights[gid] || 0); });
  score = score / genres.length;
  score += (candidate.vote_average || 0) * 2;
  return score;
}

async function updateRecommendations() {
  const scroll = document.getElementById("reco-scroll");
  const list = myRanked();

  if (list.length === 0) {
    scroll.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--ink-soft);font-weight:600">Classe des films pour avoir des recommandations</div>`;
    return;
  }

  scroll.innerHTML = `<div style="padding:20px"><span class="loading-spin"></span></div>`;

  try {
    await ensureGenreData();
    const freshList = myRanked();
    const genreWeights = computeGenreWeights(freshList);

    const top3 = freshList.slice(0, 3);
    const next3 = freshList.slice(3, 6);
    const sourcePool = [...top3, ...top3, ...next3];
    const sample = [...sourcePool].sort(() => Math.random() - 0.5).slice(0, 5);
    const uniqueSample = [...new Map(sample.map(m => [m.id, m])).values()];

    const allIds = getAllMovieIdsForUser(currentUser);
    const results = await Promise.all(
      uniqueSample.map(async (m) => {
        const recos = await getRecommendations(m.id);
        return recos.map(r => ({ ...r, because: m.title }));
      })
    );

    const seen = new Set(); const merged = [];
    results.flat().forEach(r => {
      if (!seen.has(r.id) && !allIds.has(r.id)) { seen.add(r.id); merged.push(r); }
    });

    merged.forEach(m => { m._score = scoreCandidate(m, genreWeights); });
    const scoredSorted = merged.filter(m => m._score > 0).sort((a,b) => b._score - a._score);
    const fallback = merged.filter(m => m._score === 0).sort((a,b) => (b.vote_average||0) - (a.vote_average||0));
    const final = [...scoredSorted, ...fallback].slice(0, 10);

    if (!final.length) {
      scroll.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--ink-soft);font-weight:600">Classe plus de films pour avoir des recos</div>`;
      return;
    }

    scroll.innerHTML = final.map(m => {
      const poster = m.poster_path ? TMDB_IMG + m.poster_path : "";
      return `
      <div class="reco-item">
        ${poster ? `<img src="${poster}" alt="${m.title}">` : `<div style="aspect-ratio:2/3;background:#eee"></div>`}
        <div class="reco-item-body">
          <div class="reco-item-title">${m.title}</div>
          <div class="reco-item-meta">${m.release_date ? m.release_date.slice(0,4) : "?"} · ⭐${m.vote_average ? m.vote_average.toFixed(1) : "—"}</div>
          <button class="reco-add-btn" data-movie='${escapeAttr(JSON.stringify(simplifyMovie(m)))}'>+ Ajouter</button>
        </div>
      </div>`;
    }).join("");

    scroll.querySelectorAll(".reco-add-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        addToRanked(JSON.parse(btn.dataset.movie));
        btn.textContent = "✓"; btn.disabled = true;
      });
    });
  } catch (e) {
    scroll.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--ink-soft);font-weight:600">Erreur de chargement</div>`;
  }
}

function renderRecentFeed() {
  const el = document.getElementById("recent-list");

  const entries = [];
  Object.entries(allRankings).forEach(([userId, list]) => {
    const profile = PROFILES.find(p => p.id === userId);
    if (!profile) return;
    list.forEach((m, i) => {
      entries.push({ movie: m, userId, profile, position: i + 1, addedAt: m.addedAt || 0 });
    });
  });

  const byMovie = {};
  entries.forEach(e => {
    if (!byMovie[e.movie.id]) byMovie[e.movie.id] = { movie: e.movie, raters: [], latestAddedAt: 0 };
    byMovie[e.movie.id].raters.push({ profile: e.profile, position: e.position });
    byMovie[e.movie.id].latestAddedAt = Math.max(byMovie[e.movie.id].latestAddedAt, e.addedAt);
  });

  const grouped = Object.values(byMovie).sort((a,b) => b.latestAddedAt - a.latestAddedAt).slice(0, 20);

  if (!grouped.length) {
    el.innerHTML = `<div class="empty-state" style="margin:0">Personne n'a encore classé de film</div>`;
    return;
  }

  el.innerHTML = grouped.map(g => {
    const poster = g.movie.poster_path ? TMDB_IMG + g.movie.poster_path : "";
    return `
    <div class="recent-row">
      ${poster ? `<img class="recent-poster" src="${poster}" alt="${g.movie.title}">` : `<div class="recent-poster" style="background:#E8E4F5"></div>`}
      <div class="recent-info">
        <div class="recent-title">${g.movie.title}</div>
        <div class="recent-raters">
          ${g.raters.map(r => `
            <span class="rater-chip" style="--pc:${r.profile.color}">
              <span class="rater-initial">${r.profile.initial}</span>
              #${r.position}
            </span>
          `).join("")}
        </div>
      </div>
    </div>`;
  }).join("");
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("context-overlay").addEventListener("click", (e) => {
    if (e.target.id === "context-overlay") closeContextMenu();
  });
  document.getElementById("recommend-overlay").addEventListener("click", (e) => {
    if (e.target.id === "recommend-overlay") closeRecommendSheet();
  });
  document.querySelectorAll(".context-item").forEach(item => {
    item.addEventListener("click", () => {
      if (activeContextIndex === null) return;
      const action = item.dataset.action;
      const i = activeContextIndex;
      const list = [...myRanked()];

      if (action === "top" && i !== 0) {
        const [movie] = list.splice(i, 1);
        list.unshift(movie);
        saveRankingToCloud(currentUser, list);
        setTimeout(() => {
          const firstBadge = document.querySelector('.rank-card[data-pos="1"] .rank-badge');
          if (firstBadge) fireConfetti(firstBadge);
        }, 80);
        showToast(`${movie.title} en N°1 🏆`);
      } else if (action === "up" && i > 0) {
        [list[i-1], list[i]] = [list[i], list[i-1]];
        saveRankingToCloud(currentUser, list);
      } else if (action === "down" && i < list.length - 1) {
        [list[i+1], list[i]] = [list[i], list[i+1]];
        saveRankingToCloud(currentUser, list);
      } else if (action === "remove") {
        const [movie] = list.splice(i, 1);
        saveRankingToCloud(currentUser, list);
        showToast(`${movie.title} retiré`);
      }
      closeContextMenu();
    });
  });

  listenProfiles(list => {
    PROFILES = list;
    // Si le profil sauvegardé localement n'existe plus côté Firestore, on repart à zéro
    if (currentUser && !PROFILES.some(p => p.id === currentUser)) {
      currentUser = null; viewingUser = null;
      localStorage.removeItem("letop_user");
    }
    if (!onboardingNewUser) renderPage();
  });
  listenAllRankings(data => {
    allRankings = data;
    if (currentUser) renderApp();
  });
  listenIncomingRecos(data => {
    incomingRecos = data;
    if (currentUser && !onboardingNewUser) renderApp();
  });
  renderPage();
});
</script>
